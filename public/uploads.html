// Construye una tarjeta para una fuente — separado para reutilizar el render
// dentro de cada grupo.
function buildSourceCard(src){
  const log = el('pre', {class:'log', id:`log-${src.id}`});
  const status = el('div', {class:'status-line'}, el('span', {class:'badge b-idle'}, 'Esperando archivo'));
  let file, btn;
  if (src.syncMode) {
    file = el('span', {}, '');
    btn = el('button', {class:'btn', onclick: () => handleSync(src)}, '🔄 Sincronizar');
  } else {
    file = el('input', {type:'file', accept:'.xlsx,.xls,.csv', id:`file-${src.id}`});
    btn = el('button', {class:'btn', onclick: () => handleUpload(src)}, 'Subir');
    if (src.disabled) { btn.disabled = true; btn.textContent = 'Próximamente'; }
  }
  let cronBtn = null;
  if (src.cronEndpoint) {
    cronBtn = el('button', {
      class:'btn',
      style: 'background:#10B981;color:#fff;',
      onclick: () => handleCronSync(src),
    }, '⚡ Auto-sync ahora');
  }
  const lastUp = getLastUpdated(src.id);
  const updBadge = el('div', {class:'last-updated', id:`updated-${src.id}`},
    lastUp ? `🕐 Última actualización: ${fmtDate(lastUp)}` : '');
  if (!lastUp) updBadge.style.display = 'none';

  // Botón + panel de historial (bloque separado; no toca updBadge)
  const histPanel = el('div', { class:'hist-panel', id:`hist-panel-${src.id}` });
  const histBtn = el('button', {
    class:'hist-btn',
    id:`hist-btn-${src.id}`,
    type:'button',
    onclick: function() {
      const p = document.getElementById('hist-panel-' + src.id);
      const opened = p.classList.toggle('open');
      if (opened) renderHistorialInto(p, src.id);
      this.textContent = histBtnLabel(src.id, opened);
    }
  }, histBtnLabel(src.id, false));
  const histWrap = el('div', { class:'hist-wrap', id:`hist-wrap-${src.id}` }, histBtn, histPanel);
  const tieneHist = getHistorial(src.id).length > 0;
  if (!lastUp && !tieneHist) histWrap.style.display = 'none';
  // Estado de los datos en Supabase (lo llena `pintarEstadoFuente`)
  const dataStatus = el('div', { class:'fuente-status empty', id:`fstatus-${src.id}` },
    el('span', {class:'dot'}), 'Cargando…');
  // Slot extra opcional (ej. Promociones por temporada dentro de Lista de Precios)
  let extraSection = null;
  if (src.extraSlot) {
    const ex = src.extraSlot;
    const exFile = el('input', {type:'file', accept:'.xlsx,.xls,.csv', id:`file-${ex.id}`});
    const exBtn = el('button', {class:'btn', onclick: () => handleUploadExtra(src, ex)}, 'Subir');
    const exStatus = el('div', {class:'status-line', id:`status-${ex.id}`}, el('span', {class:'badge b-idle'}, 'Sin archivo (opcional)'));
    const exLog = el('pre', {class:'log', id:`log-${ex.id}`});
    extraSection = el('div', {style:'margin-top:16px; padding-top:14px; border-top:1px dashed #CBD5E1;'},
      el('div', {style:'font-weight:600; font-size:13px; color:#334155; margin-bottom:4px;'}, ex.title),
      el('div', {class:'desc', style:'font-size:12px;'}, ex.desc),
      el('div', {class:'meta', style:'font-size:11px;'}, `📄 ${ex.file} · 🎯 ${ex.table}`),
      exStatus,
      el('div', {class:'actions'}, exFile, exBtn),
      exLog,
    );
  }

  return el('div', {class:'card'},
    el('h3', {}, src.title),
    el('div', {class:'desc'}, src.desc),
    el('div', {class:'meta'}, src.combined
      ? `📄 ${src.file} · 🎯 ${src.combined.map(c=>c.table).join(' + ')}`
      : `📄 ${src.file} · 🎯 ${src.table}`),
    dataStatus,
    updBadge,
    histWrap,
    status,
    el('div', {class:'actions'}, file, btn, cronBtn),
    log,
    extraSection,
  );
}

// Sube el archivo del slot extra (independiente del principal)
async function handleUploadExtra(src, ex){
  const input = document.getElementById(`file-${ex.id}`);
  const statusLine = document.getElementById(`status-${ex.id}`);
  const log = document.getElementById(`log-${ex.id}`);
  const setExStatus = (cls, text) => {
    statusLine.innerHTML = '';
    statusLine.append(el('span', {class:`badge ${cls}`}, text));
  };
  const appendExLog = (msg) => {
    log.classList.add('open');
    log.textContent += msg + '\n';
    log.scrollTop = log.scrollHeight;
  };
  const f = input.files?.[0];
  if (!f) { setExStatus('b-err','Selecciona un archivo'); return; }
  setExStatus('b-warn','Parseando...');
  try {
    const buf = await f.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    appendExLog(`Hojas: ${wb.SheetNames.join(', ')}`);
    const rows = PARSERS[ex.parser](wb, f.name);
    appendExLog(`Filas parseadas: ${rows.length}`);
    if (rows.length > 0) {
      appendExLog(`Período detectado: ${rows[0].anio}-${String(rows[0].mes).padStart(2,'0')}${rows[0].campania ? ' · ' + rows[0].campania : ''}`);
    }
    const deletePeriodos = rows.length > 0 ? [{anio: rows[0].anio, mes: rows[0].mes}] : null;
    // Reusa postChunks pero con un "src" ficticio para que los logs vayan al log del slot
    const exSrc = { id: ex.id };
    await postChunks(exSrc, ex.table, ex.onConflict, rows, null, deletePeriodos);
    setExStatus('b-ok', `✓ ${rows.length} filas`);
    // El slot extra registra su historial en el src padre para que aparezca
    // en el mismo desplegable de la tarjeta principal.
    pushHistorial(src.id, { estado:'ok', tipo:'extra', slot: ex.id, filas: rows.length, archivo: f.name });
  } catch (e) {
    console.error(e);
    setExStatus('b-err','Error');
    appendExLog('ERROR: ' + e.message);
    pushHistorial(src.id, { estado:'error', tipo:'extra', slot: ex.id, archivo: f.name, mensaje: e.message });
  }
}

function renderGrupoSection(grupo, fuentesG){
  const colapsadosLS = getColapsados();
  const collapsed = !!colapsadosLS[grupo.id];

  const chevron = el('span', {class:'grupo-chevron'}, '▼');
  const header = el('div', { class:'grupo-header', style:`border-bottom: 2px solid ${grupo?.color || '#94A3B8'};` },
    chevron,
    el('h2', { style: `margin:0; color:${grupo?.color || '#94A3B8'}; font-size:20px;` }, grupo?.label || 'Otros'),
    grupo?.subtitle ? el('span', { style: 'color:#64748B; font-size:13px;' }, grupo.subtitle) : null,
    el('span', { style: 'color:#94A3B8; font-size:12px; margin-left:auto;' }, `${fuentesG.length} fuente${fuentesG.length !== 1 ? 's' : ''}`)
  );

  const cardsWrap = el('div', { class:'grupo-cards' });
  for (const src of fuentesG) cardsWrap.appendChild(buildSourceCard(src));

  const section = el('section', { class: 'grupo-section' + (collapsed ? ' collapsed' : '') }, header, cardsWrap);
  header.addEventListener('click', () => {
    const ahoraCol = !section.classList.contains('collapsed');
    section.classList.toggle('collapsed', ahoraCol);
    setColapsado(grupo?.id || '__otros__', ahoraCol);
  });
  return section;
}

function renderCards(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const grupo of GRUPOS) {
    const fuentesG = SOURCES.filter(s => s.grupo === grupo.id);
    if (fuentesG.length === 0) continue;
    grid.appendChild(renderGrupoSection(grupo, fuentesG));
  }
  const sinGrupo = SOURCES.filter(s => !s.grupo);
  if (sinGrupo.length > 0) {
    grid.appendChild(renderGrupoSection({ id:'__otros__', label:'Otros', color:'#94A3B8', subtitle:'' }, sinGrupo));
  }
}

function setStatus(src, cls, text){
  const card = document.getElementById(`file-${src.id}`).closest('.card');
  const line = card.querySelector('.status-line');
  line.innerHTML = '';
  line.append(el('span', {class:`badge ${cls}`}, text));
}
function appendLog(src, msg){
  const log = document.getElementById(`log-${src.id}`);
  log.classList.add('open');
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

async function handleUpload(src){
  const input = document.getElementById(`file-${src.id}`);
  const f = input.files?.[0];
  if (!f) { setStatus(src,'b-err','Selecciona un archivo'); return; }
  setStatus(src,'b-warn','Parseando...');
  let filasTotal = 0;
  try {
    const buf = await f.arrayBuffer();
    appendLog(src, `Archivo: ${(f.size / (1024 * 1024)).toFixed(1)} MB`);
    // Para archivos grandes, minimizar el uso de memoria del navegador.
    // No usar sheets:[] (rompe silenciosamente en XLSX 0.18.5 con algunos archivos).
    const readOpts = { type: 'array', cellDates: true, dense: true, cellStyles: false, cellHTML: false, cellFormula: false, bookVBA: false };
    const wb = XLSX.read(buf, readOpts);
    appendLog(src, `Hojas: ${wb.SheetNames.join(', ')}`);
    for (const nm of wb.SheetNames) {
      const s = wb.Sheets[nm];
      appendLog(src, `  · ${nm} → ref=${s && s['!ref'] ? s['!ref'] : '(sin ref)'}`);
    }

    // Combined ERP: run multiple parsers from the same workbook
    if (src.combined) {
      for (const sub of src.combined) {
        appendLog(src, `--- ${sub.label} (${sub.table}) ---`);
        const rows = PARSERS[sub.parser](wb, f.name);
        filasTotal += rows.length;
        appendLog(src, `Filas parseadas: ${rows.length}`);
        if ((sub.parser === 'precios' || sub.parser === 'promosTemporada' || sub.parser === 'sellOutMensual') && rows.length > 0) {
          appendLog(src, `Período detectado: ${rows[0].anio}-${String(rows[0].mes).padStart(2,'0')}${rows[0].campania ? ' · ' + rows[0].campania : ''}`);
        }
        // Replace por (año, mes) para precios y por (año, mes, campania) para promos
        const deletePeriodos = rows.length > 0 && (sub.parser === 'precios' || sub.parser === 'promosTemporada' || sub.parser === 'sellOutMensual')
          ? [{
              anio: rows[0].anio, mes: rows[0].mes,
              ...(rows[0].campania && (sub.parser === 'promosTemporada' || sub.parser === 'sellOutMensual') ? { campania: rows[0].campania } : {}),
            }]
          : null;
        await postChunks(src, sub.table, sub.onConflict, rows, sub.replaceAnios, deletePeriodos);
      }
    // Estados de cuenta and Roadmap+Precios have special handling
    } else if (src.parser === 'estadoCuenta') {
      const data = PARSERS.estadoCuenta(wb, src.cliente, f.name);
      appendLog(src, `Resumen sem ${data.resumen.semana}/${data.resumen.anio} · Saldo ${data.resumen.saldo_actual?.toLocaleString()} · Vencido ${data.resumen.saldo_vencido?.toLocaleString()} · DSO ${data.resumen.dso}d`);
      appendLog(src, `Aging: 0-30=${data.resumen.aging_d0_30.toLocaleString()} · 31-60=${data.resumen.aging_d31_60.toLocaleString()} · 61-90=${data.resumen.aging_d61_90.toLocaleString()} · +90=${data.resumen.aging_mas90.toLocaleString()}`);
      appendLog(src, `Venc mes 1/2/3: ${data.resumen.venc_mes_1.toLocaleString()} / ${data.resumen.venc_mes_2.toLocaleString()} / ${data.resumen.venc_mes_3.toLocaleString()}`);
      appendLog(src, `Detalle: ${data.detalle.length} facturas`);
      const r = await fetch('/api/upload-estado-cuenta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(`HTTP ${r.status}: ${JSON.stringify(j).slice(0, 300)}`);
      appendLog(src, `✓ estado_cuenta id=${j.id} · TC día: ${j.tipo_cambio ?? '—'} · ${j.detalle_insertado} facturas insertadas`);
    } else {
      const rows = PARSERS[src.parser](wb, f.name);
      filasTotal = rows.length;
      appendLog(src, `Filas parseadas: ${rows.length}`);
      // Diagnóstico específico para sellout-general (siempre, no solo cuando rows=0)
      if (src.parser === 'selloutGeneral' && window.__selloutGeneralDiag) {
        const d = window.__selloutGeneralDiag;
        appendLog(src, `DIAG rows_crudas=${d.rowsCrudas} descartadas_sin_id=${d.descartadosSinId} generadas=${d.generados}`);
        if (rows.length === 0) {
          appendLog(src, `DIAG keys row 0: ${JSON.stringify(d.primerRowKeys).slice(0, 500)}`);
          if (d.primerRowSample) {
            appendLog(src, `DIAG row 0: ${JSON.stringify(d.primerRowSample).slice(0, 800)}`);
          }
        }
      }
      if ((src.parser === 'precios' || src.parser === 'promosTemporada' || src.parser === 'sellOutMensual') && rows.length > 0) {
        appendLog(src, `Período detectado: ${rows[0].anio}-${String(rows[0].mes).padStart(2,'0')}${rows[0].campania ? ' · ' + rows[0].campania : ''}`);
      }
      if (src.parser === 'revkoSellout' && window.__revkoSelloutDiag) {
        const d = window.__revkoSelloutDiag;
        appendLog(src, `DIAG revko rows_crudas=${d.rowsCrudas} generadas=${d.generados} meses=${d.mesesDetectados.join(', ')}${d.colisiones ? ' · colisiones_hash=' + d.colisiones : ''}`);
        if (rows.length === 0) {
          appendLog(src, `DIAG keys row 0: ${JSON.stringify(d.primerRowKeys).slice(0, 500)}`);
          if (d.primerRowSample) appendLog(src, `DIAG row 0: ${JSON.stringify(d.primerRowSample).slice(0, 800)}`);
        }
      }

      // Replace por (año, mes) para precios / (año, mes, campania) para promos.
      // revkoSellout NO usa deletePeriodos: sus IDs son hash determinista del
      // contenido, así que upsert maneja tanto re-uploads del mismo archivo
      // como archivos semanales sin borrar semanas previas del mes.
      const deletePeriodos = rows.length > 0 && (src.parser === 'precios' || src.parser === 'promosTemporada' || src.parser === 'sellOutMensual')
        ? [{
            anio: rows[0].anio, mes: rows[0].mes,
            ...(rows[0].campania && (src.parser === 'promosTemporada' || src.parser === 'sellOutMensual') ? { campania: rows[0].campania } : {}),
          }]
        : null;

      // Replace por años: el servidor borra esos años antes del primer chunk
      // (para que desaparezcan los SKUs que ya no estén en el Excel).
      await postChunks(src, src.table, src.onConflict, rows, src.replaceAnios, deletePeriodos);
    }

    // Auto-recalculate intermediate tables after certain uploads
    // (erp-acteck ya no recalcula sell_in_sku ni ventas_mensuales: el sell-in
    //  ahora viene directo de facturacion_clientes via hoja "Facturación")
    const recalcMap = {
      'digitalife-sellout': ['sellout_sku'],
      'dicotech-sellout':   ['sellout_sku'],
    };
    const recalcTables = recalcMap[src.id];
    if (recalcTables) {
      appendLog(src, `Recalculando: ${recalcTables.join(', ')}...`);
      setStatus(src,'b-warn','Recalculando...');
      try {
        const rr = await fetch('/api/recalculate', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({tables: recalcTables})
        });
        const rj = await rr.json();
        if (rj.ok) {
          for (const r of rj.results) {
            appendLog(src, `  ✓ ${r.table}: ${r.count ?? 0} filas${r.error ? ' ERROR: '+r.error : ''}`);
          }
        } else {
          appendLog(src, `  ⚠ Recalc error: ${rj.error}`);
        }
      } catch(re) {
        appendLog(src, `  ⚠ Recalc failed: ${re.message}`);
      }
    }

    saveLastUpdated(src.id);
    pushHistorial(src.id, { estado:'ok', tipo:'upload', filas: filasTotal, archivo: f.name });
    const badge = document.getElementById(`updated-${src.id}`);
    badge.textContent = `🕐 Última actualización: ${fmtDate(new Date().toISOString())}`;
    badge.style.display = '';
    setStatus(src,'b-ok',`✓ Completado`);
  } catch (e) {
    console.error(e);
    setStatus(src,'b-err','Error');
    appendLog(src, 'ERROR: ' + e.message);
    pushHistorial(src.id, { estado:'error', tipo:'upload', archivo: f.name, mensaje: e.message });
  }
}

// Sync Master Embarques from Google Drive (browser-side fetch using user's Google session)
const SHEET_XLSX_URL = 'https://docs.google.com/spreadsheets/d/1m2I_oTd4EYTQ1v5KQOAZGIPmt58K3jRUbHGk0ed0JoQ/export?format=xlsx';

async function handleCronSync(src){
  setStatus(src,'b-warn','Sincronizando desde Google Drive...');
  appendLog(src, `Disparando ${src.cronEndpoint}...`);
  try {
    const r = await fetch(src.cronEndpoint, { method: 'GET' });
    const text = await r.text();
    let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
    if (!r.ok) {
      appendLog(src, 'ERROR ' + r.status + ': ' + (data.error || text.slice(0,200)));
      setStatus(src,'b-err','Error ' + r.status);
      return;
    }
    const up = data.upserted || 0;
    const parsed = data.rows_parsed || 0;
    appendLog(src, `✓ Procesadas ${parsed} filas · Upserteadas ${up} · Sheet: ${data.sheet || '?'}`);
    if (data.errors?.length) appendLog(src, 'Errores: ' + JSON.stringify(data.errors).slice(0, 400));
    saveLastUpdated(src.id);
    pushHistorial(src.id, { estado:'ok', tipo:'cron', filas: up });
    const badge = document.getElementById(`updated-${src.id}`);
    badge.textContent = `🕐 Última actualización: ${fmtDate(new Date().toISOString())}`;
    badge.style.display = '';
    setStatus(src,'b-ok',`✓ ${up} filas sincronizadas`);
  } catch (e) {
    appendLog(src, 'ERROR de red: ' + e.message);
    setStatus(src,'b-err','Error');
    pushHistorial(src.id, { estado:'error', tipo:'cron', mensaje: e.message });
  }
}

async function handleSync(src){
  setStatus(src,'b-warn','Descargando desde Google Drive...');
  const log = document.getElementById(`log-${src.id}`);
  log.classList.add('open');
  appendLog(src, 'Descargando Excel desde Google Sheets...');
  try {
    // Fetch XLSX using user's browser cookies (Google session)
    const resp = await fetch(SHEET_XLSX_URL);
    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        appendLog(src, 'ERROR: No tienes acceso al archivo. Asegúrate de estar logueado en Google en este navegador.');
      }
      throw new Error(`HTTP ${resp.status} al descargar Google Sheet`);
    }
    const buf = await resp.arrayBuffer();
    appendLog(src, `Archivo descargado (${(buf.byteLength/1024).toFixed(0)} KB). Parseando...`);

    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    appendLog(src, `Hojas: ${wb.SheetNames.join(', ')}`);

    const rows = PARSERS.masterEmbarques(wb);
    appendLog(src, `Filas parseadas: ${rows.length}`);

    await postChunks(src, 'embarques_compras', 'po,codigo', rows);

    saveLastUpdated(src.id);
    pushHistorial(src.id, { estado:'ok', tipo:'sync', filas: rows.length });
    const badge = document.getElementById(`updated-${src.id}`);
    badge.textContent = `🕐 Última actualización: ${fmtDate(new Date().toISOString())}`;
    badge.style.display = '';
    setStatus(src,'b-ok','✓ Sincronizado');
  } catch(e) {
    console.error(e);
    appendLog(src, 'ERROR: ' + e.message);
    pushHistorial(src.id, { estado:'error', tipo:'sync', mensaje: e.message });
    setStatus(src,'b-err','Error');
  }
}

async function postChunks(src, table, onConflict, rows, deleteAnios, deletePeriodos){
  // Deduplicate: keep last occurrence per conflict key to avoid
  // "ON CONFLICT cannot affect row a second time" errors
  const keys = onConflict.split(',').map(k => k.trim());
  const seen = new Map();
  for (const row of rows) {
    const k = keys.map(c => String(row[c] ?? '')).join('||');
    seen.set(k, row);
  }
  const deduped = [...seen.values()];
  if (deduped.length < rows.length) {
    appendLog(src, `  Dedup: ${rows.length} → ${deduped.length} filas únicas`);
  }

  let total = 0;
  for (let i=0; i<deduped.length; i+=CHUNK) {
    const batch = deduped.slice(i, i+CHUNK);
    const payload = {table, onConflict, rows: batch};
    // Solo en el primer chunk enviamos deleteAnios para que el servidor
    // borre esos años antes del upsert (replace por año).
    if (i === 0 && Array.isArray(deleteAnios) && deleteAnios.length > 0) {
      payload.deleteAnios = deleteAnios;
      appendLog(src, `  Replace anios: ${deleteAnios.join(', ')} (borrando antes del primer chunk)`);
    }
    if (i === 0 && Array.isArray(deletePeriodos) && deletePeriodos.length > 0) {
      payload.deletePeriodos = deletePeriodos;
      const lbl = deletePeriodos.map(p => `${p.anio}-${String(p.mes).padStart(2,'0')}`).join(', ');
      appendLog(src, `  Replace periodos: ${lbl} (borrando antes del primer chunk)`);
    }
    const r = await fetch('/api/import-central', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`HTTP ${r.status}: ${t.slice(0,200)}`);
    }
    const j = await r.json().catch(()=>({}));
    total += batch.length;
    appendLog(src, `  ${table} batch ${i}-${i+batch.length}: ${j.ok ? 'ok' : 'ok'}`);
  }
  appendLog(src, `TOTAL ${table}: ${total}`);
}
