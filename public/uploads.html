<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />

<style>
  :root { --azul:#1e40af; --gris:#f3f4f6; --bord:#e5e7eb; --ok:#059669; --err:#dc2626; --warn:#d97706; }

  .card{border:1px solid var(--bord);border-radius:10px;padding:16px;background:#fff;display:flex;flex-direction:column;gap:10px}

  .btn{background:var(--azul);color:#fff;border:0;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px}

  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}

<body>
<header>
  <h1>⚙️ Actualizar datos</h1>
  <a href="/">← Volver al dashboard</a>
</header>
<main>
  <p class="intro">Sube cada archivo <strong>tal como te lo comparten</strong>. El sistema lo parsea y actualiza Supabase según la estrategia correcta para cada fuente.</p>
  <div class="grid" id="grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const SOURCES = [
  { id:'erp-acteck', title:'ERP Acteck — Ventas & Inventario', desc:'Archivo único con hojas Vw_TablaH_Ventas + Vw_TablaH_Inventario. Actualiza ventas (upsert incremental) e inventario (replace total) en una sola operación.', file:'Actualizaciones ERP.xlsx',
    combined: [
      { table:'ventas_erp', onConflict:'venta_id,venta_renglon', parser:'erpVentas', label:'Ventas' },
      { table:'inventario_acteck', onConflict:'articulo,no_almacen', parser:'erpInventario', label:'Inventario', replace:true }
    ]
  },
  { id:'digitalife-sellout', title:'Digitalife · Sellout histórico', desc:'Historico Sellout Digitalife (hoja "Sellout Digitalife"). Append con dedup por fecha+parte+cantidad+total.', file:'Historico Sellout Digitalife.xlsx', table:'sellout_detalle', onConflict:'cliente,fecha,no_parte,row_hash', parser:'digitalifeSellout' },
  { id:'digitalife-inv', title:'Digitalife · Inventario semanal', desc:'Archivo Acteck_BalamRush_Inventario (Hoja39). Snapshot semanal por (cliente, sku, anio, semana).', file:'Acteck_BalamRush_Inventario.xlsx', table:'inventario_cliente', onConflict:'cliente,sku,anio,semana', parser:'digitalifeInv' },
  { id:'pcel-vm', title:'PCEL · venta-marca semanal', desc:'Archivo venta-marca-ACTECK. Actualiza sellout semanal + histórico mensual + catálogo SKU.', file:'venta-marca-ACTECK.xlsx',
    combined: [
      { table:'sellout_pcel',          onConflict:'anio,semana,sku', parser:'pcelVentaMarca',      label:'Semanal' },
      { table:'sellout_pcel_mensual',  onConflict:'anio,mes,sku',    parser:'pcelMensualFromVM',   label:'Mensual histórico' },
      { table:'catalogo_sku_pcel',     onConflict:'sku',             parser:'pcelCatalogoFromVM',  label:'Catálogo SKU' },
    ]
  },
  { id:'ec-pcel', title:'Estado de cuenta · PCEL', desc:'Archivo 00473SemanaNN. Upsert (cliente, anio, semana) + aging en detalle.', file:'00473SemanaNN.xlsx', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'estadoCuenta', cliente:'pcel' },
  { id:'ec-digitalife', title:'Estado de cuenta · Digitalife', desc:'Archivo 00764SemanaNN. Upsert (cliente, anio, semana) + aging en detalle.', file:'00764SemanaNN.xlsx', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'estadoCuenta', cliente:'digitalife' },
  { id:'roadmap-precios', title:'Catálogo · Roadmap y Precios', desc:'Archivo Roadmap y Precios.xlsx (2 hojas). Replace completo.', file:'Roadmap y Precios.xlsx', table:'roadmap_sku+precios_sku', parser:'roadmapPrecios', replace:true },
  { id:'master-embarques', title:'Master Embarques', desc:'Archivo Master Embarques.xlsx (hoja "2026"). Upsert por (PO, CODIGO). Detecta entregas directas a clientes externos (ej. DECME sin número) y calcula lead time por SKU.', file:'Master Embarques.xlsx', table:'embarques_compras', onConflict:'po,codigo', parser:'masterEmbarques' },
];

const CHUNK = 200;
const LS_UPDATED_KEY = 'uploads_last_updated';

// ===== Parsers =====
function toISODate(v){
  if (v == null || v === '') return null;
  if (typeof v === 'number') {
    // Excel serial date
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d.toISOString().slice(0,10);
  }
  const d = new Date(v);
  return isNaN(d) ? null : d.toISOString().slice(0,10);
}
function toNum(v){ if (v==null||v===''||v==='#N/A') return null; const n=Number(v); return isNaN(n)?null:n; }
function toInt(v){ const n=toNum(v); return n==null?null:Math.round(n); }
function toStr(v){ if (v==null) return null; const s=String(v).trim(); return s===''||s==='#N/A'?null:s; }
function hash(s){ let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return String(h); }
function snake(s){ return String(s).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }

const PARSERS = {
  erpVentas(wb){
    const sh = wb.Sheets['Vw_TablaH_Ventas'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    return rows.map(r => {
      const out = {};
      for (const k of Object.keys(r)) out[snake(k)] = r[k];
      // Normalize key columns that may have been renamed
      out.venta_id = toInt(out.venta_id ?? out.ventaid);
      out.venta_renglon = toInt(out.venta_renglon ?? out.ventarenglon);
      if (out.venta_id == null || out.venta_renglon == null) return null;
      return out;
    }).filter(Boolean);
  },
  erpInventario(wb){
    const sh = wb.Sheets['Vw_TablaH_Inventario'] || wb.Sheets[wb.SheetNames[1]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    return rows.map(r => ({
      articulo: toStr(r.articulo ?? r.Articulo),
      no_almacen: toInt(r.No_Almacen ?? r.no_almacen),
      no_cedis: toInt(r.No_Cedis ?? r.no_cedis),
      almacen_nombre: toStr(r.Almacen_Nombre ?? r.almacen_nombre),
      cedis: toStr(r.Cedis ?? r.cedis),
      disponible: toNum(r.Disponible ?? r.disponible),
      inventario: toNum(r.Inventario ?? r.inventario),
      costopromedio: toNum(r.CostoPromedio ?? r.costopromedio),
      costodisponible: toNum(r.CostoDisponible ?? r.costodisponible),
      costoinventario: toNum(r.CostoInventario ?? r.costoinventario),
    })).filter(r => r.articulo && r.no_almacen != null);
  },
  digitalifeSellout(wb){
    const sh = wb.Sheets['Sellout Digitalife'] || wb.Sheets['Hoja40'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    return rows.map(r => {
      const obj = {};
      for (const k of Object.keys(r)) obj[snake(k)] = r[k];
      const o = {
        cliente: 'digitalife',
        fecha: toISODate(obj.fecha),
        marca: toStr(obj.marca),
        no_parte: toStr(obj.no_parte ?? obj.noparte ?? obj.parte),
        descripcion: toStr(obj.descripcion ?? obj.descripcion_1 ?? obj.titulo),
        cantidad: toNum(obj.cantidad),
        precio: toNum(obj.precio),
        descuento: toNum(obj.descuento),
        iva: toNum(obj.iva),
        subtotal: toNum(obj.subtotal),
        total: toNum(obj.total),
      };
      if (!o.fecha || !o.no_parte) return null;
      o.row_hash = hash([o.fecha,o.no_parte,o.cantidad,o.total].join('|'));
      return o;
    }).filter(Boolean);
  },
  digitalifeInv(wb){
    const sh = wb.Sheets['Hoja39'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    // ISO week calculation
    const now = new Date();
    const anio = now.getFullYear();
    const jan1 = new Date(anio, 0, 1);
    const days = Math.floor((now - jan1) / 86400000);
    const semana = Math.ceil((days + jan1.getDay() + 1) / 7);
    return rows.map(r => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      return {
        cliente: 'digitalife',
        sku: toStr(obj.parte ?? obj.sku ?? obj.no_parte),
        anio,
        semana,
        marca: toStr(obj.marca),
        titulo: toStr(obj.titulo ?? obj.descripcion),
        stock: toInt(obj.stock ?? obj.inventario),
        costo_convenio: toNum(obj.costo_convenio),
        precio_venta: toNum(obj.precio_venta),
        fecha_ultima_venta: toISODate(obj.fecha_ultima_venta),
        dias_sin_venta: toNum(obj.dias_sin_venta),
        valor: toNum(obj.valor),
      };
    }).filter(r => r.sku);
  },
  pcelVentaMarca(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    // Find the "Vta Semana N" column to parse the week number
    let semana = null;
    const headers = Object.keys(rows[0] || {});
    for (const h of headers) {
      const m = String(h).match(/vta\s+semana\s+(\d+)/i);
      if (m) { semana = parseInt(m[1],10); break; }
    }
    // Mapa de meses ES (abreviatura) → número
    const MES_NUM = {
      ene:1, feb:2, mar:3, abr:4, may:5, jun:6,
      jul:7, ago:8, sep:9, set:9, oct:10, nov:11, dic:12,
    };
    const MES_NOMBRE = {
      ene:'Ene', feb:'Feb', mar:'Mar', abr:'Abr', may:'May', jun:'Jun',
      jul:'Jul', ago:'Ago', sep:'Sep', oct:'Oct', nov:'Nov', dic:'Dic',
    };
    const year = new Date().getFullYear();
    return rows.map(r => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const vtaSemKey = Object.keys(obj).find(k => /vta_semana_\d+/.test(k));
      // Columnas mensuales "vta_abr", "vta_mar", etc.
      // Ordenar CRONOLÓGICAMENTE descendente (más reciente primero).
      // Ajuste de año: si el mes del archivo es > mes actual, significa que es del año anterior.
      const currentMonth = new Date().getMonth() + 1;
      const monthKeys = Object.keys(obj)
        .filter(k => /^vta_[a-z]{3}$/.test(k))
        .map(k => {
          const abrev = k.slice(4); // después de "vta_"
          const num = MES_NUM[abrev];
          if (!num) return null;
          // Si el mes > mes actual del año, asumir año anterior
          const anio = num > currentMonth ? year - 1 : year;
          const sortKey = anio * 100 + num; // ej 202604
          return { key: k, abrev, num, anio, sortKey, nombre: MES_NOMBRE[abrev] };
        })
        .filter(Boolean)
        .sort((a, b) => b.sortKey - a.sortKey); // descendente

      const m0 = monthKeys[0] || {};
      const m1 = monthKeys[1] || {};
      const m2 = monthKeys[2] || {};
      const m3 = monthKeys[3] || {};

      return {
        anio: year,
        semana: semana,
        sku: toStr(obj.sku),
        pcel_sku: toStr(obj.sku),
        marca: toStr(obj.marca),
        modelo: toStr(obj.modelo),
        producto: toStr(obj.producto ?? obj.modelo),
        familia: toStr(obj.familia),
        subfamilia: toStr(obj.subfamilia),
        inventario: toInt(obj.inventario),
        costo_promedio: toNum(obj.costo_promedio),
        antiguedad: toInt(obj.antiguedad),
        transito: toInt(obj.transito),
        back_order: toInt(obj.back_order),
        vta_semana: toInt(vtaSemKey ? obj[vtaSemKey] : null),
        vta_mes_actual:         toInt(m0.key ? obj[m0.key] : null),
        vta_mes_actual_nombre:  m0.nombre || null,
        vta_mes_1:              toInt(m1.key ? obj[m1.key] : null),
        vta_mes_1_nombre:       m1.nombre || null,
        vta_mes_2:              toInt(m2.key ? obj[m2.key] : null),
        vta_mes_2_nombre:       m2.nombre || null,
        vta_mes_3:              toInt(m3.key ? obj[m3.key] : null),
        vta_mes_3_nombre:       m3.nombre || null,
      };
    }).filter(r => r.sku && r.semana != null);
  },

  /**
   * Parser de histórico mensual a partir del mismo archivo venta-marca.
   * Extrae los 3 meses del archivo → una fila por (sku, mes).
   * Upsert por (anio, mes, sku): si el mes ya existe, lo actualiza.
   */
  pcelMensualFromVM(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    let semana = null;
    const headers = Object.keys(rows[0] || {});
    for (const h of headers) {
      const m = String(h).match(/vta\s+semana\s+(\d+)/i);
      if (m) { semana = parseInt(m[1],10); break; }
    }
    const MES_NUM = {
      ene:1, feb:2, mar:3, abr:4, may:5, jun:6,
      jul:7, ago:8, sep:9, set:9, oct:10, nov:11, dic:12,
    };
    const MES_NOMBRE = {
      1:'Ene', 2:'Feb', 3:'Mar', 4:'Abr', 5:'May', 6:'Jun',
      7:'Jul', 8:'Ago', 9:'Sep', 10:'Oct', 11:'Nov', 12:'Dic',
    };
    const year = new Date().getFullYear();
    const currentMonth = new Date().getMonth() + 1;

    const out = [];
    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const sku = toStr(obj.sku);
      if (!sku) continue;

      const monthCols = Object.keys(obj)
        .filter(k => /^vta_[a-z]{3}$/.test(k))
        .map(k => {
          const abrev = k.slice(4);
          const num = MES_NUM[abrev];
          if (!num) return null;
          const anio = num > currentMonth ? year - 1 : year;
          return { key: k, mes: num, anio, nombre: MES_NOMBRE[num] };
        })
        .filter(Boolean);

      for (const mc of monthCols) {
        const piezas = toInt(obj[mc.key]);
        if (piezas === null) continue;
        out.push({
          anio: mc.anio,
          mes: mc.mes,
          nombre_mes: mc.nombre,
          sku,
          piezas,
          ultima_semana_cargada: semana,
        });
      }
    }
    return out;
  },

  /**
   * Parser de catálogo SKU a partir del mismo archivo venta-marca.
   * Una fila por SKU. Upsert por sku:
   *   - Si es SKU nuevo → primera_aparicion = hoy, apariciones = 1
   *   - Si ya existe   → solo actualizar ultima_aparicion = hoy, apariciones += 1
   *                      y refresca metadata (producto, marca, etc.)
   *
   * Como no podemos hacer "apariciones += 1" desde un upsert simple, usamos
   * una estrategia: enviar las filas nuevas con apariciones=1 y primera/última =
   * hoy. El servidor hace INSERT ON CONFLICT DO UPDATE que actualiza
   * ultima_aparicion y apariciones se queda. Para contador preciso se usaría
   * un trigger, pero por ahora nos basta con primera/ultima aparición.
   */
  pcelCatalogoFromVM(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    const hoy = new Date().toISOString().slice(0,10);
    const seen = new Set();
    const out = [];
    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const sku = toStr(obj.sku);
      if (!sku || seen.has(sku)) continue;
      seen.add(sku);
      out.push({
        sku,
        producto:   toStr(obj.producto),
        marca:      toStr(obj.marca),
        modelo:     toStr(obj.modelo),
        familia:    toStr(obj.familia),
        subfamilia: toStr(obj.subfamilia),
        primera_aparicion: hoy,   // se ignora si ya existe
        ultima_aparicion:  hoy,
        apariciones: 1,           // placeholder
      });
    }
    return out;
  },
  estadoCuenta(wb, cliente, filename){
    const sh = wb.Sheets[wb.SheetNames[0]];
    const cellVal = (ref) => { const c = sh[ref]; return c ? (c.v ?? null) : null; };

    // Year + week + fecha_corte del header F6 ("Estado de cuenta de la Semana X Del DD/MM/YYYY al DD/MM/YYYY")
    let semana = null, fecha_corte = null, year = new Date().getFullYear();
    const headerTxt = String(cellVal('F6') || '');
    const mm = headerTxt.match(/Semana\s+(\d+)\s+Del\s+(\d{2}\/\d{2}\/\d{4})\s+al\s+(\d{2}\/\d{2}\/\d{4})/i);
    if (mm) {
      semana = parseInt(mm[1], 10);
      const parts = mm[3].split('/');
      fecha_corte = `${parts[2]}-${parts[1]}-${parts[0]}`;
      year = parseInt(parts[2], 10);
    } else {
      const m2 = String(filename||'').match(/Semana\s*(\d+)/i);
      if (m2) semana = parseInt(m2[1],10);
      fecha_corte = new Date().toISOString().slice(0,10);
    }

    // Razón social: B8
    const razon_social = toStr(cellVal('B8')) || (cliente==='pcel'?'PC ONLINE':'API GLOBAL');

    // Resumen
    const saldo_actual   = toNum(cellVal('F8')) || 0;
    const saldo_vencido  = toNum(cellVal('G8')) || 0;
    const notas_credito  = toNum(cellVal('H8')) || 0;
    const saldo_a_vencer = toNum(cellVal('I8')) || 0;

    // Detail rows: headers on row 10 (range: 9)
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null, range: 9});
    const detalle = [];
    let aging_d0_30 = 0, aging_d31_60 = 0, aging_d61_90 = 0, aging_mas90 = 0;
    const vencMesMap = {}; // YYYY-MM -> monto

    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const importe = toNum(obj.importe_factura ?? obj.importe);
      const saldo = toNum(obj.saldo_actual ?? obj.saldo) || 0;
      if (!obj.movimientos && !importe && !saldo) continue;
      const ag_corr   = toNum(obj.corriente) || 0;
      const ag_01_30  = toNum(obj['01_30_dias'] ?? obj._01_30_dias) || 0;
      const ag_31_60  = toNum(obj['31_60_dias'] ?? obj._31_60_dias) || 0;
      const ag_61_90  = toNum(obj['61_90_dias'] ?? obj._61_90_dias) || 0;
      const ag_91_180 = toNum(obj['91_180_dias'] ?? obj._91_180_dias) || 0;
      const ag_181    = toNum(obj.mas_de_181_dias ?? obj._mas_de_181_dias) || 0;

      aging_d0_30  += ag_01_30;
      aging_d31_60 += ag_31_60;
      aging_d61_90 += ag_61_90;
      aging_mas90  += ag_91_180 + ag_181;

      const venc = toISODate(obj.vencimiento);
      if (venc && saldo > 0) {
        const key = venc.slice(0,7); // YYYY-MM
        vencMesMap[key] = (vencMesMap[key] || 0) + saldo;
      }

      detalle.push({
        movimiento: toStr(obj.movimientos ?? obj.movimiento),
        condicion: toStr(obj.condicion),
        referencia: toStr(obj.referencia),
        fecha_emision: toISODate(obj.fecha_emision),
        vencimiento: venc,
        importe_factura: importe,
        dias_moratorios: toInt(obj.dias_moratorios),
        saldo_actual: saldo,
        aging_corriente: ag_corr,
        aging_01_30: ag_01_30,
        aging_31_60: ag_31_60,
        aging_61_90: ag_61_90,
        aging_91_180: ag_91_180,
        aging_181_mas: ag_181,
      });
    }

    // venc_mes_1/2/3 = mes actual, +1, +2 (desde fecha_corte si se pudo leer, si no hoy)
    const base = fecha_corte ? new Date(fecha_corte + 'T00:00:00') : new Date();
    const offsetKey = (off) => {
      const d = new Date(base.getFullYear(), base.getMonth() + off, 1);
      const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    };
    const venc_mes_1 = vencMesMap[offsetKey(0)] || 0;
    const venc_mes_2 = vencMesMap[offsetKey(1)] || 0;
    const venc_mes_3 = vencMesMap[offsetKey(2)] || 0;

    // DSO: promedio ponderado de días (hoy - fecha_emision) para facturas con saldo > 0
    const hoy = new Date();
    let sumDays = 0, sumSaldo = 0;
    for (const d of detalle) {
      if (d.saldo_actual > 0 && d.fecha_emision) {
        const fe = new Date(d.fecha_emision + 'T00:00:00');
        const days = Math.max(0, Math.floor((hoy - fe) / 86400000));
        sumDays += days * d.saldo_actual;
        sumSaldo += d.saldo_actual;
      }
    }
    const dso = sumSaldo > 0 ? Math.round(sumDays / sumSaldo) : null;

    return {
      resumen: {
        cliente, anio: year, semana, fecha_corte,
        saldo_actual, saldo_vencido, notas_credito, saldo_a_vencer,
        razon_social,
        aging_d0_30, aging_d31_60, aging_d61_90, aging_mas90,
        venc_mes_1, venc_mes_2, venc_mes_3,
        dso,
        // NO tocamos linea_credito_usd: se conserva el valor previo de la DB
      },
      detalle
    };
  },
  masterEmbarques(wb){
    // La hoja principal se llama "2026" (o el año en curso). Fallback: primera hoja.
    const year = new Date().getFullYear();
    const sh = wb.Sheets[String(year)] || wb.Sheets['2026'] || wb.Sheets[wb.SheetNames[0]];
    if (!sh) return [];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});

    // Clasifica el campo CEDIS: si empieza con dígito, es almacén interno;
    // si empieza con letra (ej. "DECME"), es entrega directa a cliente externo.
    const classifyCedis = (raw) => {
      const s = (raw == null ? '' : String(raw)).trim();
      if (!s) return { cedis: null, entrega_directa_cliente: null };
      if (/^\d/.test(s)) return { cedis: s, entrega_directa_cliente: null };
      return { cedis: s, entrega_directa_cliente: s };
    };

    return rows.map(r => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const po = toStr(obj.po);
      const codigo = toStr(obj.codigo);
      // Filas basura: sin PO y sin código son separadores/totales
      if (!po || !codigo) return null;
      const { cedis, entrega_directa_cliente } = classifyCedis(obj.cedis);
      return {
        po,
        codigo,
        fecha_emision: toISODate(obj.fecha_emision),
        grupo: toStr(obj.grupo),
        cbm: toNum(obj.cbm),
        fraccion_arancelaria: toStr(obj.f_a ?? obj.fa),
        porcentaje: toNum(obj['%'] ?? obj.porcentaje),
        familia: toStr(obj.familia),
        descripcion: toStr(obj.descripcion),
        po_qty: toInt(obj.po_qty),
        shp_qty: toInt(obj.shp_qty),
        unit_price: toNum(obj.unit_price),
        total_amount: toNum(obj.total_amount),
        metodo_pago: toStr(obj.metodo_de_pago),
        supplier: toStr(obj.supplier),
        fecha_inicio_produccion: toISODate(obj.fecha_inicio_de_produccion),
        fin_produccion: toISODate(obj.fin_de_produccion),
        ref_ff: toStr(obj.ref_ff),
        naviera: toStr(obj.naviera),
        tipo_carga: toStr(obj.tipo_de_carga),
        tipo_contenedor: toStr(obj.tipo_de_cont),
        costo_flete: toNum(obj.costo_flete),
        fdw: toStr(obj.fdw),
        contenedor: toStr(obj.contenedor),
        etd: toISODate(obj.etd),
        eta_puerto: toISODate(obj.eta_puerto),
        agente_aduanal: toStr(obj.a_a ?? obj.aa),
        arribo_cedis: toISODate(obj.arribo_a_cedis),
        lt: toStr(obj.lt),
        cedis,
        entrega_directa_cliente,
        estatus: toStr(obj.estatus),
        comentarios_trafico: toStr(obj.comentarios_trafico),
        comentarios_diseno: toStr(obj.comentarios_diseno),
      };
    }).filter(Boolean);
  },
  roadmapPrecios(wb){
    const shR = wb.Sheets['Roadmap Q2 2026'] || wb.Sheets[wb.SheetNames[0]];
    const shP = wb.Sheets['BD Lista de Precios'] || wb.Sheets[wb.SheetNames[1]];
    const roadmap = XLSX.utils.sheet_to_json(shR, {defval:null, range:12}).map((r,i) => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      return {
        sku: toStr(obj.sku),
        rdmp: toStr(obj.roadmap ?? obj.rdmp),
        descripcion: toStr(obj.descripcion_2 ?? obj.descripcion ?? obj.descripcion_1),
        sort_order: i
      };
    }).filter(r => r.sku);
    const precios = XLSX.utils.sheet_to_json(shP, {defval:null, range:4}).map((r,i) => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const pd = obj.precio_c_descuento ?? obj.precio_descuento;
      return {
        sku: toStr(obj.sku),
        precio_aaa: toNum(obj.aaa ?? obj.precio_aaa),
        descuento: toNum(obj.descuento),
        precio_descuento: pd==='Consultar' ? null : toNum(pd),
        sort_order: i
      };
    }).filter(r => r.sku);
    return { roadmap, precios };
  }
};

// ===== Last-updated helpers =====
function getLastUpdated(srcId){
  try { const d = JSON.parse(localStorage.getItem(LS_UPDATED_KEY)||'{}'); return d[srcId]||null; } catch{ return null; }
}
function saveLastUpdated(srcId){
  try { const d = JSON.parse(localStorage.getItem(LS_UPDATED_KEY)||'{}'); d[srcId]=new Date().toISOString(); localStorage.setItem(LS_UPDATED_KEY,JSON.stringify(d)); } catch{}
}
function fmtDate(iso){
  if(!iso) return null;
  const d=new Date(iso);
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ===== UI =====
function el(tag, attrs={}, ...kids){
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const k of kids.flat()) if (k != null) n.append(k.nodeType ? k : document.createTextNode(k));
  return n;
}

function renderCards(){
  const grid = document.getElementById('grid');
  for (const src of SOURCES) {
    const log = el('pre', {class:'log', id:`log-${src.id}`});
    const status = el('div', {class:'status-line'}, el('span', {class:'badge b-idle'}, 'Esperando archivo'));
    let file, btn;
    if (src.syncMode) {
      file = el('span', {}, '');
      btn = el('button', {class:'btn', onclick: () => handleSync(src)}, '🔄 Sincronizar');
    } else {
      file = el('input', {type:'file', accept:'.xlsx,.xls', id:`file-${src.id}`});
      btn = el('button', {class:'btn', onclick: () => handleUpload(src)}, 'Subir');
      if (src.disabled) { btn.disabled = true; btn.textContent = 'Próximamente'; }
    }
    // Last-updated badge
    const lastUp = getLastUpdated(src.id);
    const updBadge = el('div', {class:'last-updated', id:`updated-${src.id}`},
      lastUp ? `🕐 Última actualización: ${fmtDate(lastUp)}` : '');
    if (!lastUp) updBadge.style.display = 'none';
    const card = el('div', {class:'card'},
      el('h3', {}, src.title),
      el('div', {class:'desc'}, src.desc),
      el('div', {class:'meta'}, src.combined
        ? `📄 ${src.file} · 🎯 ${src.combined.map(c=>c.table).join(' + ')}`
        : `📄 ${src.file} · 🎯 ${src.table}`),
      updBadge,
      status,
      el('div', {class:'actions'}, file, btn),
      log
    );
    grid.appendChild(card);
  }
}

function setStatus(src, cls, text){
  const card = document.getElementById(`file-${src.id}`).closest('.card');
  const line = card.querySelector('.status-line');
  line.innerHTML = '';
  line.append(el('span', {class:`badge ${cls}`}, text));
}
function appendLog(src, msg){
  const log = document.getElementById(`log-${src.id}`);
  log.classList.add('open');
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

async function handleUpload(src){
  const input = document.getElementById(`file-${src.id}`);
  const f = input.files?.[0];
  if (!f) { setStatus(src,'b-err','Selecciona un archivo'); return; }
  setStatus(src,'b-warn','Parseando...');
  try {
    const buf = await f.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    appendLog(src, `Hojas: ${wb.SheetNames.join(', ')}`);

    // Combined ERP: run multiple parsers from the same workbook
    if (src.combined) {
      for (const sub of src.combined) {
        appendLog(src, `--- ${sub.label} (${sub.table}) ---`);
        const rows = PARSERS[sub.parser](wb);
        appendLog(src, `Filas parseadas: ${rows.length}`);
        await postChunks(src, sub.table, sub.onConflict, rows);
      }
    // Estados de cuenta and Roadmap+Precios have special handling
    } else if (src.parser === 'estadoCuenta') {
      const data = PARSERS.estadoCuenta(wb, src.cliente, f.name);
      appendLog(src, `Resumen sem ${data.resumen.semana}/${data.resumen.anio} · Saldo ${data.resumen.saldo_actual?.toLocaleString()} · Vencido ${data.resumen.saldo_vencido?.toLocaleString()} · DSO ${data.resumen.dso}d`);
      appendLog(src, `Aging: 0-30=${data.resumen.aging_d0_30.toLocaleString()} · 31-60=${data.resumen.aging_d31_60.toLocaleString()} · 61-90=${data.resumen.aging_d61_90.toLocaleString()} · +90=${data.resumen.aging_mas90.toLocaleString()}`);
      appendLog(src, `Venc mes 1/2/3: ${data.resumen.venc_mes_1.toLocaleString()} / ${data.resumen.venc_mes_2.toLocaleString()} / ${data.resumen.venc_mes_3.toLocaleString()}`);
      appendLog(src, `Detalle: ${data.detalle.length} facturas`);
      const r = await fetch('/api/upload-estado-cuenta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(`HTTP ${r.status}: ${JSON.stringify(j).slice(0, 300)}`);
      appendLog(src, `✓ estado_cuenta id=${j.id} · TC día: ${j.tipo_cambio ?? '—'} · ${j.detalle_insertado} facturas insertadas`);
    } else if (src.parser === 'roadmapPrecios') {
      const {roadmap, precios} = PARSERS.roadmapPrecios(wb);
      appendLog(src, `Roadmap: ${roadmap.length} SKUs, Precios: ${precios.length} SKUs`);
      await postChunks(src, 'roadmap_sku', 'sku', roadmap);
      await postChunks(src, 'precios_sku', 'sku', precios);
    } else {
      const rows = PARSERS[src.parser](wb);
      appendLog(src, `Filas parseadas: ${rows.length}`);
      await postChunks(src, src.table, src.onConflict, rows);
    }

    // Auto-recalculate intermediate tables after certain uploads
    const recalcMap = {
      'erp-acteck': ['ventas_mensuales', 'sell_in_sku'],
      'digitalife-sellout': ['sellout_sku'],
    };
    const recalcTables = recalcMap[src.id];
    if (recalcTables) {
      appendLog(src, `Recalculando: ${recalcTables.join(', ')}...`);
      setStatus(src,'b-warn','Recalculando...');
      try {
        const rr = await fetch('/api/recalculate', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({tables: recalcTables})
        });
        const rj = await rr.json();
        if (rj.ok) {
          for (const r of rj.results) {
            appendLog(src, `  ✓ ${r.table}: ${r.count ?? 0} filas${r.error ? ' ERROR: '+r.error : ''}`);
          }
        } else {
          appendLog(src, `  ⚠ Recalc error: ${rj.error}`);
        }
      } catch(re) {
        appendLog(src, `  ⚠ Recalc failed: ${re.message}`);
      }
    }

    saveLastUpdated(src.id);
    const badge = document.getElementById(`updated-${src.id}`);
    badge.textContent = `🕐 Última actualización: ${fmtDate(new Date().toISOString())}`;
    badge.style.display = '';
    setStatus(src,'b-ok',`✓ Completado`);
  } catch (e) {
    console.error(e);
    setStatus(src,'b-err','Error');
    appendLog(src, 'ERROR: ' + e.message);
  }
}

// Sync Master Embarques from Google Drive (browser-side fetch using user's Google session)
const SHEET_XLSX_URL = 'https://docs.google.com/spreadsheets/d/1m2I_oTd4EYTQ1v5KQOAZGIPmt58K3jRUbHGk0ed0JoQ/export?format=xlsx';

async function handleSync(src){
  setStatus(src,'b-warn','Descargando desde Google Drive...');
  const log = document.getElementById(`log-${src.id}`);
  log.classList.add('open');
  appendLog(src, 'Descargando Excel desde Google Sheets...');
  try {
    // Fetch XLSX using user's browser cookies (Google session)
    const resp = await fetch(SHEET_XLSX_URL);
    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        appendLog(src, 'ERROR: No tienes acceso al archivo. Asegúrate de estar logueado en Google en este navegador.');
      }
      throw new Error(`HTTP ${resp.status} al descargar Google Sheet`);
    }
    const buf = await resp.arrayBuffer();
    appendLog(src, `Archivo descargado (${(buf.byteLength/1024).toFixed(0)} KB). Parseando...`);

    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    appendLog(src, `Hojas: ${wb.SheetNames.join(', ')}`);

    const rows = PARSERS.masterEmbarques(wb);
    appendLog(src, `Filas parseadas: ${rows.length}`);

    await postChunks(src, 'embarques_compras', 'po,codigo', rows);

    saveLastUpdated(src.id);
    const badge = document.getElementById(`updated-${src.id}`);
    badge.textContent = `🕐 Última actualización: ${fmtDate(new Date().toISOString())}`;
    badge.style.display = '';
    setStatus(src,'b-ok','✓ Sincronizado');
  } catch(e) {
    console.error(e);
    appendLog(src, 'ERROR: ' + e.message);
    setStatus(src,'b-err','Error');
  }
}

async function postChunks(src, table, onConflict, rows){
  // Deduplicate: keep last occurrence per conflict key to avoid
  // "ON CONFLICT cannot affect row a second time" errors
  const keys = onConflict.split(',').map(k => k.trim());
  const seen = new Map();
  for (const row of rows) {
    const k = keys.map(c => String(row[c] ?? '')).join('||');
    seen.set(k, row);
  }
  const deduped = [...seen.values()];
  if (deduped.length < rows.length) {
    appendLog(src, `  Dedup: ${rows.length} → ${deduped.length} filas únicas`);
  }

  let total = 0;
  for (let i=0; i<deduped.length; i+=CHUNK) {
    const batch = deduped.slice(i, i+CHUNK);
    const r = await fetch('/api/import-central', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({table, onConflict, rows: batch})
    });
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`HTTP ${r.status}: ${t.slice(0,200)}`);
    }
    const j = await r.json().catch(()=>({}));
    total += batch.length;
    appendLog(src, `  ${table} batch ${i}-${i+batch.length}: ${j.ok ? 'ok' : 'ok'}`);
  }
  appendLog(src, `TOTAL ${table}: ${total}`);
}

renderCards();
