<head>

<title>Actualizar datos — Acteck Dashboard</title>
<style>
  :root { --azul:#1e40af; --gris:#f3f4f6; --bord:#e5e7eb; --ok:#059669; --err:#dc2626; --warn:#d97706; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#fff;color:#111}
  header{padding:24px 32px;border-bottom:1px solid var(--bord);display:flex;justify-content:space-between;align-items:center}
  header h1{margin:0;font-size:22px}
  header a{color:var(--azul);text-decoration:none;font-size:14px}
  main{padding:24px 32px;max-width:1200px;margin:0 auto}
  .intro{color:#555;margin-bottom:24px;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .card{border:1px solid var(--bord);border-radius:10px;padding:16px;background:#fff;display:flex;flex-direction:column;gap:10px}
  .card h3{margin:0;font-size:15px}
  .card .desc{color:#666;font-size:13px;min-height:36px}
  .card .meta{font-size:12px;color:#888}
  .card .actions{display:flex;gap:8px;align-items:center;margin-top:auto}
  .card input[type=file]{flex:1;font-size:12px}
  .btn{background:var(--azul);color:#fff;border:0;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
  .b-ok{background:#dcfce7;color:var(--ok)}
  .b-err{background:#fee2e2;color:var(--err)}
  .b-warn{background:#fef3c7;color:var(--warn)}
  .b-idle{background:#e5e7eb;color:#374151}
  .log{max-height:140px;overflow:auto;font-family:ui-monospace,monospace;font-size:11px;background:#0b1020;color:#d1d5db;border-radius:6px;padding:8px;white-space:pre-wrap;display:none}
  .log.open{display:block}
  .status-line{font-size:12px;min-height:18px}
  .last-updated{font-size:11px;color:#059669;background:#dcfce7;padding:2px 8px;border-radius:12px;display:inline-block;margin-top:2px}
  .hist-wrap{margin-top:6px}
  .hist-btn{background:transparent;border:none;color:#64748B;cursor:pointer;font-size:11px;padding:2px 4px;text-decoration:underline;text-underline-offset:2px}
  .hist-btn:hover{color:#0F172A}
  .hist-panel{display:none;margin-top:8px;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;background:#fff;max-height:280px;overflow-y:auto}
  .hist-panel.open{display:block}
  .grupo-section{grid-column:1 / -1;display:flex;flex-direction:column;gap:14px}
  .grupo-header{cursor:pointer;display:flex;align-items:baseline;gap:14px;padding:18px 4px 8px;margin:10px 0 0;user-select:none;transition:opacity .15s}
  .grupo-header:hover{opacity:.75}
  .grupo-chevron{display:inline-block;transition:transform .2s;font-size:14px;color:#64748B;width:14px}
  .grupo-section.collapsed .grupo-chevron{transform:rotate(-90deg)}
  .grupo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .grupo-section.collapsed .grupo-cards{display:none}
  .fuente-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;background:#f1f5f9;padding:4px 10px;border-radius:12px;align-self:flex-start}
  .fuente-status .dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;flex:none}
  .fuente-status.fresh .dot{background:#10b981}
  .fuente-status.stale .dot{background:#f59e0b}
  .fuente-status.old .dot{background:#ef4444}
  .fuente-status.empty{color:#94a3b8;background:#f8fafc;font-style:italic}

  { id:'sellout-general', grupo:'globales', tipo:'semana', statusKey:'sellout_general', title:'Sellout General (mayoristas)', desc:'Archivo semanal "Sellout General.xlsx" (hoja "Hoja1") con el detalle de ventas de nuestros mayoristas hacia sus clientes finales. 357K+ filas históricas (2025-en adelante). Upsert por id de transacción — solo actualiza filas nuevas. Mapeo idcliente→mayorista canónico: CT, CVA, Ingram, Arroba, Dicotech, Techs Mart, Grupo Unidades de Cómputo, DC, Exel, PCH, Grupo Loma, Group NSSTORE, Kabik.', file:'Sellout General.xlsx', table:'sellout_general', onConflict:'id', parser:'selloutGeneral' },

    combined: [

  { id:'dicotech-inv', grupo:'dicotech', tipo:'semana', statusKey:'inv_dicotech', title:'Dicotech · Inventario semanal', desc:'Archivo "Reporte-Inventario_Inventario Acteck Semanal.csv". Stock distribuido en 8 almacenes (DC, Arboledas, Amazon, Dicoags2, Guadalajara, Zacatecas, santafe, leon2). Se guarda TANTO el agregado por SKU (inventario_cliente) COMO el desglose por sucursal (inventario_cliente_sucursal) en un mismo upload.', file:'Reporte-Inventario_Inventario Acteck Semanal.csv',
    combined: [
      { table:'inventario_cliente', onConflict:'cliente,sku,anio,semana', parser:'dicotechInv', label:'Agregado por SKU' },
      { table:'inventario_cliente_sucursal', onConflict:'cliente,sku,sucursal,anio,semana', parser:'dicotechInvSucursal', label:'Desglose por sucursal' },
    ]

  { id:'ec-pcel', grupo:'estados_cuenta', tipo:'semana', statusKey:'ec_pcel', title:'PCEL · Estado de cuenta', desc:'Archivo 00473SemanaNN. Upsert (cliente, anio, semana) + aging en detalle.', file:'00473SemanaNN.xlsx', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'estadoCuenta', cliente:'pcel' },
  { id:'ec-dicotech', grupo:'estados_cuenta', tipo:'semana', statusKey:'ec_dicotech', title:'Dicotech · Estado de cuenta', desc:'Archivo 00708SemanaNN (REVKO TECHNOLOGY). Upsert (cliente, anio, semana) + aging en detalle.', file:'00708SemanaNN.xlsx', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'estadoCuenta', cliente:'dicotech' },
];

const CHUNK = 200;
const LS_UPDATED_KEY = 'uploads_last_updated';

// ===== Parsers =====
function toISODate(v){
  if (v == null || v === '') return null;
  if (typeof v === 'number') {
    // Excel serial date
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d.toISOString().slice(0,10);
  }
  const d = new Date(v);
  return isNaN(d) ? null : d.toISOString().slice(0,10);
}
function toNum(v){ if (v==null||v===''||v==='#N/A') return null; const n=Number(v); return isNaN(n)?null:n; }
function toInt(v){ const n=toNum(v); return n==null?null:Math.round(n); }
function toStr(v){ if (v==null) return null; const s=String(v).trim(); return s===''||s==='#N/A'?null:s; }
function hash(s){ let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return String(h); }
function snake(s){ return String(s).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }

const PARSERS = {
  erpVentas(wb){
    const sh = wb.Sheets['Vw_TablaH_Ventas'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    return rows.map(r => {
      const out = {};
      for (const k of Object.keys(r)) out[snake(k)] = r[k];
      // Normalize key columns that may have been renamed
      out.venta_id = toInt(out.venta_id ?? out.ventaid);
      out.venta_renglon = toInt(out.venta_renglon ?? out.ventarenglon);
      if (out.venta_id == null || out.venta_renglon == null) return null;
      return out;
    }).filter(Boolean);
  },
  // "Listas de Precios" — pivot con SKU en filas y listas en columnas.
  // Layout:
  //   row 2: 'Suma de Precio' + 'Etiquetas de columna'
  //   row 3: 'Etiquetas de fila' + [API PROVISIONAL, DECME PROVISIONAL, DICOTECH,
  //          Mayoreo A, Mayoreo AA, Mayoreo AAA, MAYOREO B1, Mayoreo PMM,
  //          PCEL PROVISIONAL, Total general]
  //   row 4+: SKU en col 0, precios por lista en col 1-9
  // Se filtran solo las 5 listas comerciales activas.
  preciosERP(wb){
    const LISTAS_INCLUIDAS = new Set([
      'API PROVISIONAL',
      'DECME PROVISIONAL',
      'DICOTECH',
      'Mayoreo AAA',
      'PCEL PROVISIONAL',
    ]);
    const sh = wb.Sheets['Listas de Precios'];
    if (!sh) return [];
    const arr = XLSX.utils.sheet_to_json(sh, {header:1, defval:null, raw:false});
    if (arr.length < 5) return [];
    const headerRow = arr[3] || [];
    // Mapear índice de columna → nombre de lista (solo las incluidas)
    const listaByCol = {};
    for (let c = 1; c < headerRow.length; c++) {
      const nm = toStr(headerRow[c]);
      if (LISTAS_INCLUIDAS.has(nm)) listaByCol[c] = nm;
    }
    const now = new Date();
    const anio = now.getFullYear();
    const mes = now.getMonth() + 1;
    const out = [];
    for (let r = 4; r < arr.length; r++) {
      const row = arr[r];
      if (!row) continue;
      const sku = toStr(row[0]);
      if (!sku || sku === 'Total general') continue;
      for (const [colStr, lista] of Object.entries(listaByCol)) {
        const precio = toNum(row[parseInt(colStr)]);
        if (precio == null || precio <= 0) continue;
        out.push({ sku, lista, moneda: 'PESOS', anio, mes, precio });
      }
    }
    return out;
  },

  // "Cuotas" — pivot con cliente en filas y meses × años en columnas.
  // Layout:
  //   row 1: header block — "<01/01/25", "2025" (span 12 cols), "Total 2025",
  //          "2026" (span 12 cols), "Total 2026", "Total general"
  //   row 2: labels de mes — null, null, ene..dic (2025), null, ene..dic (2026), ...
  //   row 4+: cliente en col 0, valores mensuales en cols 2..13 (2025) y 15..26 (2026)
  // Se emite una fila por (cliente, anio, mes) con cuota_min = cuota_ideal (misma
  // fuente). Cliente name se normaliza a cliente_key lowercase para empatar con
  // el resto de las tablas.
  cuotasClientes(wb){
    const NORM_CLIENTE = {
      'DICOTECH':      'dicotech',
      'DIGITAL LIFE':  'digitalife',
      'DIGITALIFE':    'digitalife',
      'PCEL':          'pcel',
    };
    const normalizar = (nm) => {
      const up = String(nm || '').trim().toUpperCase();
      if (NORM_CLIENTE[up]) return NORM_CLIENTE[up];
      return up.toLowerCase().replace(/\s+/g, '_');
    };
    const sh = wb.Sheets['Cuotas'];
    if (!sh) return [];
    const arr = XLSX.utils.sheet_to_json(sh, {header:1, defval:null});
    if (arr.length < 5) return [];
    // Detectar bloque de años y sus rangos de columnas leyendo row 1.
    // Cada año ocupa 12 columnas contiguas seguidas por "Total <año>".
    const headerAnios = arr[1] || [];
    const bloques = []; // { anio, colStart, colEnd }
    for (let c = 0; c < headerAnios.length; c++) {
      const v = String(headerAnios[c] || '').trim();
      const m = v.match(/^(20\d{2})$/);
      if (m) bloques.push({ anio: parseInt(m[1], 10), colStart: c, colEnd: c + 11 });
    }
    // Datos empiezan en row 4 (0=header, 1=años, 2=meses, 3=Etiquetas de fila).
    // Clientes con cuota manual (no se sobreescriben desde el pivot):
    // - digitalife: usa cuota25M/cuota30M de DIGITALIFE_REAL (ver constants.js);
    //   Fernando la maneja aparte porque tiene min y ideal distintos.
    const CLIENTES_CUOTA_MANUAL = new Set(['digitalife']);
    const out = [];
    for (let r = 4; r < arr.length; r++) {
      const row = arr[r];
      if (!row) continue;
      const cliente = normalizar(row[0]);
      if (!cliente || cliente === 'total_general' || cliente === '') continue;
      if (CLIENTES_CUOTA_MANUAL.has(cliente)) continue;
      for (const b of bloques) {
        for (let mes = 1; mes <= 12; mes++) {
          const val = toNum(row[b.colStart + (mes - 1)]);
          if (val == null || val <= 0) continue;
          out.push({
            cliente,
            anio: b.anio,
            mes,
            cuota_min: val,
            cuota_ideal: val,
          });
        }
      }
    }
    return out;
  },

  // "Inventario" — pivot con SKU en filas y almacenes × 5 métricas en columnas.
  // Layout:
  //   row 3: números de almacén en cols 1, 6, 11, 16, ... (uno cada 5 cols)
  //   row 4: métricas repetidas por almacén: [Suma de inventario, disponible,
  //          costopromedio, CostoDisponible, CostoInventario]
  //   row 5+: SKU en col 0, 5 valores por almacén
  // Se emite una fila por cada (sku, no_almacen) con las 5 métricas.
  // Se mapea no_almacen → almacen_nombre y CEDIS según catálogo Acteck 2026.
  erpInventario(wb){
    // Catálogo de almacenes Acteck (viene de Almacenes 2026.xlsx)
    const ALM_META = {
      1:  { nombre:'VENTAS GENERAL GUADALAJARA', cedis:'ALMACENES GUADALAJARA' },
      2:  { nombre:'VENTAS GENERAL COLOTLAN',    cedis:'ALMACENES COLOTLAN' },
      3:  { nombre:'VENTAS GENERAL MEXICO',      cedis:'ALMACENES MEXICO' },
      4:  { nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
      5:  { nombre:'REFACTURACION',              cedis:'ALMACENES GUADALAJARA' },
      6:  { nombre:'VENTAS DECME MEXICO',        cedis:'ALMACENES MEXICO' },
      9:  { nombre:'VENTAS CONSIGNACION MERCADO LIBRE', cedis:'ALMACENES GUADALAJARA' },
      10: { nombre:'ACTIVO FIJO',                cedis:'ALMACENES GUADALAJARA' },
      11: { nombre:'NO COMERCIAL',               cedis:'ALMACENES MEXICO' },
      12: { nombre:'VENTAS REFACCIONES',         cedis:'ALMACENES GUADALAJARA' },
      13: { nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
      14: { nombre:'VENTAS PAGINA WEB DROSHIPPING', cedis:'ALMACENES GUADALAJARA' },

      62: { nombre:'NO COMERCIAL',               cedis:'ALMACENES MEXICO' },
      63: { nombre:'NO COMERCIAL',               cedis:'ALMACENES MEXICO' },
      64: { nombre:'VENTAS EMPAQUE DANADO MEXICO', cedis:'ALMACENES MEXICO' },
      70: { nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
      71: { nombre:'VENTAS APARTADO ECOMMERCE TULTITLAN', cedis:'ALMACENES MEXICO' },
      90: { nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
      97: { nombre:'ALMACEN DE REMISIONES',      cedis:'ALMACENES GUADALAJARA' },
      98: { nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
      99: { nombre:'NO COMERCIAL',               cedis:'ALMACENES MEXICO' },
      100:{ nombre:'NO COMERCIAL',               cedis:'ALMACENES GUADALAJARA' },
    };
    const sh = wb.Sheets['Inventario'];
    if (!sh) return [];
    const arr = XLSX.utils.sheet_to_json(sh, {header:1, defval:null, raw:true});
    if (arr.length < 6) return [];
    const almacenesRow = arr[3] || [];  // row 3: números de almacén
    // Detectar cols de cada almacén (uno cada 5 cols empezando col 1)
    const almBlocks = [];  // { colBase, no_almacen }
    for (let c = 1; c < almacenesRow.length; c++) {
      const v = almacenesRow[c];
      if (v == null || v === 'Total general') continue;
      const n = toInt(v);
      if (n == null) continue;
      almBlocks.push({ colBase: c, no_almacen: n });
    }
    const out = [];
    for (let r = 5; r < arr.length; r++) {
      const row = arr[r];
      if (!row) continue;
      const articulo = toStr(row[0]);
      if (!articulo || articulo === 'Total general') continue;
      for (const b of almBlocks) {
        const inventario     = toNum(row[b.colBase]);
        const disponible     = toNum(row[b.colBase + 1]);
        const costopromedio  = toNum(row[b.colBase + 2]);
        const costodisponible= toNum(row[b.colBase + 3]);
        const costoinventario= toNum(row[b.colBase + 4]);
        // Solo emitir si hay stock o costo (evita fila fantasma cero)
        if ((inventario ?? 0) === 0 && (disponible ?? 0) === 0 && (costoinventario ?? 0) === 0) continue;
        const meta = ALM_META[b.no_almacen] || {};
        out.push({
          articulo,
          no_almacen: b.no_almacen,
          no_cedis: 0,
          almacen_nombre: meta.nombre || `ALMACEN ${b.no_almacen}`,
          cedis: meta.cedis || null,
          disponible,
          inventario,
          costopromedio,
          costodisponible,
          costoinventario,
        });
      }
    }
    return out;
  },
  // Vw_TablaH_Compras — órdenes de compra con costo USD + TC contable.

  },
  digitalifeSellout(wb){

  // Sellout semanal de Dicotech — CSV con 22 columnas (separador coma).
  // Columnas relevantes: Fecha, Venta (folio), Clave (código interno),
  // Cantidad, Descripcion, Marca, total_venta, total_venta_antes_IVA,
  // precio_venta_antes_IVA, Numero de parte (SKU canónico).
  dicotechSelloutSemanal(wb){
    const sh = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null, raw:false});
    return rows.map((r, i) => {
      const fecha = toISODate(r['Fecha']);
      const noParte = toStr(r['Numero de parte']);
      if (!fecha || !noParte) return null;
      const cantidad = toNum(r['Cantidad']);
      const totalSinIVA = toNum(r['total_venta_antes_IVA']);
      const totalConIVA = toNum(r['total_venta']);
      const precioSinIVA = toNum(r['precio_venta_antes_IVA']);
      const ivaCalc = Math.max(0, totalConIVA - totalSinIVA);
      // Hash determinístico: Venta (folio) + Clave + Cantidad + total + índice
      const hashSrc = [r['Venta'], r['Clave'], cantidad, totalSinIVA, i].join('|');
      return {
        cliente: 'dicotech',
        fecha,
        marca: toStr(r['Marca']),
        no_parte: noParte,
        descripcion: toStr(r['Descripcion']),
        cantidad,
        precio: precioSinIVA,
        descuento: 0,
        iva: ivaCalc,
        subtotal: totalSinIVA,
        total: totalConIVA,
        row_hash: hash(hashSrc),
      };
    }).filter(Boolean);
  },
  digitalifeInv(wb){

  // Inventario semanal Dicotech — formato real:
  //   - Una fila por SKU
  //   - Stock distribuido en 8 columnas (DC, Arboledas, Amazon, Dicoags2,
  //     Guadalajara, Zacatecas, santafe, leon2) → se SUMAN para obtener
  //     el stock total del SKU
  //   - costo_compra_antes_IVA es el costo
  //   - "Fecha ultima factura" es la última venta
  //   - "Numero de parte", "Marca", "Descripcion" son los identificadores
  // anio + semana se calculan al momento de subir (semana ISO actual).
  dicotechInv(wb){
    const sh = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    const now = new Date();
    const anio = now.getFullYear();
    const jan1 = new Date(anio, 0, 1);
    const days = Math.floor((now - jan1) / 86400000);
    const semana = Math.ceil((days + jan1.getDay() + 1) / 7);
    // Columnas de almacenes/sucursales que se suman para el stock total.
    // Si Dicotech agrega o cambia almacenes, basta con actualizar esta lista.
    const ALMACENES = ['dc','arboledas','amazon','dicoags2','guadalajara','zacatecas','santafe','leon2'];
    return rows.map(r => {
      const obj = {}; for(const k of Object.keys(r)) obj[snake(k)] = r[k];
      const sku = toStr(obj.numero_de_parte ?? obj.no_de_parte ?? obj.parte ?? obj.sku);
      if (!sku) return null;
      const stockTotal = ALMACENES.reduce((acc, key) => acc + (toInt(obj[key]) || 0), 0);
      const costo = toNum(obj.costo_compra_antes_iva ?? obj.costo);
      return {
        cliente: 'dicotech',
        sku,
        anio,
        semana,
        marca: toStr(obj.marca),
        titulo: toStr(obj.descripcion ?? obj.titulo),
        stock: stockTotal,
        costo_convenio: costo,
        precio_venta: null,            // no viene en este archivo
        fecha_ultima_venta: toISODate(obj.fecha_ultima_factura ?? obj.fecha_ultima_venta),
        dias_sin_venta: null,
        valor: costo != null ? Math.round(stockTotal * costo * 100) / 100 : null,
      };
    }).filter(Boolean);
  },
  // Desglose por sucursal del mismo archivo: emite 1 row por (SKU, sucursal)
  // con stock > 0. Se mapea el nombre del almacén al mismo formato que aparece
  // en sellout_general.sucursal para que se pueda cruzar visualmente
  // (dc→DC, arboledas→Arboledas, amazon→AMAZON, dicoags2→dicoags2,
  //  guadalajara→GDL, zacatecas→ZACATECAS, santafe→santafe, leon2→leon2).
  dicotechInvSucursal(wb){

    const days = Math.floor((now - jan1) / 86400000);
    const semana = Math.ceil((days + jan1.getDay() + 1) / 7);
    const MAP_SUCURSAL = {
      'dc': 'DC',
      'arboledas': 'Arboledas',
      'amazon': 'AMAZON',
      'dicoags2': 'dicoags2',
      'guadalajara': 'GDL',

      const sku = toStr(obj.numero_de_parte ?? obj.no_de_parte ?? obj.parte ?? obj.sku);
      if (!sku) continue;
      const costo = toNum(obj.costo_compra_antes_iva ?? obj.costo);
      const marca = toStr(obj.marca);
      const titulo = toStr(obj.descripcion ?? obj.titulo);
      for (const [alm, sucLabel] of Object.entries(MAP_SUCURSAL)) {

        if (stock <= 0) continue;
        out.push({
          cliente: 'dicotech',

          semana,
          marca,
          titulo,
          stock,
          costo_convenio: costo,

  pcelVentaMarca(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    // Find the "Vta Semana N" column to parse the week number
    let semana = null;
    const headers = Object.keys(rows[0] || {});
    for (const h of headers) {
      const m = String(h).match(/vta\s+semana\s+(\d+)/i);
      if (m) { semana = parseInt(m[1],10); break; }
    }
    // Mapa de meses ES (abreviatura) → número
    const MES_NUM = {
      ene:1, feb:2, mar:3, abr:4, may:5, jun:6,
      jul:7, ago:8, sep:9, set:9, oct:10, nov:11, dic:12,
    };
    const MES_NOMBRE = {
      ene:'Ene', feb:'Feb', mar:'Mar', abr:'Abr', may:'May', jun:'Jun',
      jul:'Jul', ago:'Ago', sep:'Sep', oct:'Oct', nov:'Nov', dic:'Dic',
    };
    const year = new Date().getFullYear();
    return rows.map(r => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const vtaSemKey = Object.keys(obj).find(k => /vta_semana_\d+/.test(k));
      // Columnas mensuales "vta_abr", "vta_mar", etc.
      // Ordenar CRONOLÓGICAMENTE descendente (más reciente primero).
      // Ajuste de año: si el mes del archivo es > mes actual, significa que es del año anterior.
      const currentMonth = new Date().getMonth() + 1;
      const monthKeys = Object.keys(obj)
        .filter(k => /^vta_[a-z]{3}$/.test(k))
        .map(k => {
          const abrev = k.slice(4); // después de "vta_"
          const num = MES_NUM[abrev];
          if (!num) return null;
          // Si el mes > mes actual del año, asumir año anterior
          const anio = num > currentMonth ? year - 1 : year;
          const sortKey = anio * 100 + num; // ej 202604
          return { key: k, abrev, num, anio, sortKey, nombre: MES_NOMBRE[abrev] };
        })
        .filter(Boolean)
        .sort((a, b) => b.sortKey - a.sortKey); // descendente

      const m0 = monthKeys[0] || {};
      const m1 = monthKeys[1] || {};
      const m2 = monthKeys[2] || {};
      const m3 = monthKeys[3] || {};

      return {
        anio: year,
        semana: semana,
        sku: toStr(obj.sku),
        pcel_sku: toStr(obj.sku),
        marca: toStr(obj.marca),
        modelo: toStr(obj.modelo),
        producto: toStr(obj.producto ?? obj.modelo),
        familia: toStr(obj.familia),
        subfamilia: toStr(obj.subfamilia),
        inventario: toInt(obj.inventario),
        costo_promedio: toNum(obj.costo_promedio),
        antiguedad: toInt(obj.antiguedad),
        transito: toInt(obj.transito),
        back_order: toInt(obj.back_order),
        vta_semana: toInt(vtaSemKey ? obj[vtaSemKey] : null),
        vta_mes_actual:         toInt(m0.key ? obj[m0.key] : null),
        vta_mes_actual_nombre:  m0.nombre || null,
        vta_mes_1:              toInt(m1.key ? obj[m1.key] : null),
        vta_mes_1_nombre:       m1.nombre || null,
        vta_mes_2:              toInt(m2.key ? obj[m2.key] : null),
        vta_mes_2_nombre:       m2.nombre || null,
        vta_mes_3:              toInt(m3.key ? obj[m3.key] : null),
        vta_mes_3_nombre:       m3.nombre || null,
      };
    }).filter(r => r.sku && r.semana != null);
  },

  /**
   * Parser de histórico mensual a partir del mismo archivo venta-marca.
   * Extrae los 3 meses del archivo → una fila por (sku, mes).
   * Upsert por (anio, mes, sku): si el mes ya existe, lo actualiza.
   */
  pcelMensualFromVM(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    let semana = null;
    const headers = Object.keys(rows[0] || {});
    for (const h of headers) {
      const m = String(h).match(/vta\s+semana\s+(\d+)/i);
      if (m) { semana = parseInt(m[1],10); break; }
    }
    const MES_NUM = {
      ene:1, feb:2, mar:3, abr:4, may:5, jun:6,
      jul:7, ago:8, sep:9, set:9, oct:10, nov:11, dic:12,
    };
    const MES_NOMBRE = {
      1:'Ene', 2:'Feb', 3:'Mar', 4:'Abr', 5:'May', 6:'Jun',
      7:'Jul', 8:'Ago', 9:'Sep', 10:'Oct', 11:'Nov', 12:'Dic',
    };
    const year = new Date().getFullYear();
    const currentMonth = new Date().getMonth() + 1;

    const out = [];
    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const sku = toStr(obj.sku);
      if (!sku) continue;

      const monthCols = Object.keys(obj)
        .filter(k => /^vta_[a-z]{3}$/.test(k))
        .map(k => {
          const abrev = k.slice(4);
          const num = MES_NUM[abrev];
          if (!num) return null;
          const anio = num > currentMonth ? year - 1 : year;
          return { key: k, mes: num, anio, nombre: MES_NOMBRE[num] };
        })
        .filter(Boolean);

      for (const mc of monthCols) {
        const piezas = toInt(obj[mc.key]);
        if (piezas === null) continue;
        out.push({
          anio: mc.anio,
          mes: mc.mes,
          nombre_mes: mc.nombre,
          sku,
          piezas,
          ultima_semana_cargada: semana,
        });
      }
    }
    return out;
  },

  /**
   * Parser de catálogo SKU a partir del mismo archivo venta-marca.
   * Una fila por SKU. Upsert por sku:
   *   - Si es SKU nuevo → primera_aparicion = hoy, apariciones = 1
   *   - Si ya existe   → solo actualizar ultima_aparicion = hoy, apariciones += 1
   *                      y refresca metadata (producto, marca, etc.)
   *
   * Como no podemos hacer "apariciones += 1" desde un upsert simple, usamos
   * una estrategia: enviar las filas nuevas con apariciones=1 y primera/última =
   * hoy. El servidor hace INSERT ON CONFLICT DO UPDATE que actualiza
   * ultima_aparicion y apariciones se queda. Para contador preciso se usaría
   * un trigger, pero por ahora nos basta con primera/ultima aparición.
   */
  pcelCatalogoFromVM(wb){
    const sh = wb.Sheets['Ventas por Fabricante'] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null});
    const hoy = new Date().toISOString().slice(0,10);
    const seen = new Set();
    const out = [];
    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const sku = toStr(obj.sku);
      if (!sku || seen.has(sku)) continue;
      seen.add(sku);
      out.push({
        sku,
        producto:   toStr(obj.producto),
        marca:      toStr(obj.marca),
        modelo:     toStr(obj.modelo),
        familia:    toStr(obj.familia),
        subfamilia: toStr(obj.subfamilia),
        primera_aparicion: hoy,   // se ignora si ya existe
        ultima_aparicion:  hoy,
        apariciones: 1,           // placeholder
      });
    }
    return out;
  },
  estadoCuenta(wb, cliente, filename){
    const sh = wb.Sheets[wb.SheetNames[0]];
    const cellVal = (ref) => { const c = sh[ref]; return c ? (c.v ?? null) : null; };

    // ── Detección de formato ──
    // Formato A (semanal "00473SemanaNN"): F6 contiene "Estado de cuenta de la Semana X..."
    // Formato B ("Antigüedad de Saldos"): A1 contiene "Antigüedad de Saldos"
    const a1 = String(cellVal('A1') || '').toLowerCase();
    const f6 = String(cellVal('F6') || '');
    const esFormatoAntiguedad = a1.includes('antig') && a1.includes('saldos');

    if (esFormatoAntiguedad) {
      return PARSERS.estadoCuentaAntiguedad(wb, cliente, filename);
    }

    // ── Formato A (original semanal) ──
    // Year + week + fecha_corte del header F6 ("Estado de cuenta de la Semana X Del DD/MM/YYYY al DD/MM/YYYY")
    let semana = null, fecha_corte = null, year = new Date().getFullYear();
    const mm = f6.match(/Semana\s+(\d+)\s+Del\s+(\d{2}\/\d{2}\/\d{4})\s+al\s+(\d{2}\/\d{2}\/\d{4})/i);
    if (mm) {
      semana = parseInt(mm[1], 10);
      const parts = mm[3].split('/');
      fecha_corte = `${parts[2]}-${parts[1]}-${parts[0]}`;
      year = parseInt(parts[2], 10);
    } else {
      const m2 = String(filename||'').match(/Semana\s*(\d+)/i);
      if (m2) semana = parseInt(m2[1],10);
      fecha_corte = new Date().toISOString().slice(0,10);
    }

    // Razón social: B8
    const razon_social = toStr(cellVal('B8')) || (cliente==='pcel'?'PC ONLINE':cliente==='dicotech'?'REVKO TECHNOLOGY SA DE CV':'API GLOBAL');

    // Resumen
    const saldo_actual   = toNum(cellVal('F8')) || 0;
    const saldo_vencido  = toNum(cellVal('G8')) || 0;
    const notas_credito  = toNum(cellVal('H8')) || 0;
    const saldo_a_vencer = toNum(cellVal('I8')) || 0;

    // Detail rows: headers on row 10 (range: 9)
    const rows = XLSX.utils.sheet_to_json(sh, {defval:null, range: 9});
    const detalle = [];
    let aging_d0_30 = 0, aging_d31_60 = 0, aging_d61_90 = 0, aging_mas90 = 0;
    const vencMesMap = {}; // YYYY-MM -> monto

    for (const r of rows) {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const importe = toNum(obj.importe_factura ?? obj.importe);
      const saldo = toNum(obj.saldo_actual ?? obj.saldo) || 0;
      if (!obj.movimientos && !importe && !saldo) continue;
      const ag_corr   = toNum(obj.corriente) || 0;
      const ag_01_30  = toNum(obj['01_30_dias'] ?? obj._01_30_dias) || 0;
      const ag_31_60  = toNum(obj['31_60_dias'] ?? obj._31_60_dias) || 0;
      const ag_61_90  = toNum(obj['61_90_dias'] ?? obj._61_90_dias) || 0;
      const ag_91_180 = toNum(obj['91_180_dias'] ?? obj._91_180_dias) || 0;
      const ag_181    = toNum(obj.mas_de_181_dias ?? obj._mas_de_181_dias) || 0;

      aging_d0_30  += ag_01_30;
      aging_d31_60 += ag_31_60;
      aging_d61_90 += ag_61_90;
      aging_mas90  += ag_91_180 + ag_181;

      const venc = toISODate(obj.vencimiento);
      if (venc && saldo > 0) {
        const key = venc.slice(0,7); // YYYY-MM
        vencMesMap[key] = (vencMesMap[key] || 0) + saldo;
      }

      detalle.push({
        movimiento: toStr(obj.movimientos ?? obj.movimiento),
        condicion: toStr(obj.condicion),
        referencia: toStr(obj.referencia),
        fecha_emision: toISODate(obj.fecha_emision),
        vencimiento: venc,
        importe_factura: importe,
        dias_moratorios: toInt(obj.dias_moratorios),
        saldo_actual: saldo,
        aging_corriente: ag_corr,
        aging_01_30: ag_01_30,
        aging_31_60: ag_31_60,
        aging_61_90: ag_61_90,
        aging_91_180: ag_91_180,
        aging_181_mas: ag_181,
      });
    }

    // venc_mes_1/2/3 = mes actual, +1, +2 (desde fecha_corte si se pudo leer, si no hoy)
    const base = fecha_corte ? new Date(fecha_corte + 'T00:00:00') : new Date();
    const offsetKey = (off) => {
      const d = new Date(base.getFullYear(), base.getMonth() + off, 1);
      const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    };
    const venc_mes_1 = vencMesMap[offsetKey(0)] || 0;
    const venc_mes_2 = vencMesMap[offsetKey(1)] || 0;
    const venc_mes_3 = vencMesMap[offsetKey(2)] || 0;

    // DSO: promedio ponderado de días (hoy - fecha_emision) para facturas con saldo > 0
    const hoy = new Date();
    let sumDays = 0, sumSaldo = 0;
    for (const d of detalle) {
      if (d.saldo_actual > 0 && d.fecha_emision) {
        const fe = new Date(d.fecha_emision + 'T00:00:00');
        const days = Math.max(0, Math.floor((hoy - fe) / 86400000));
        sumDays += days * d.saldo_actual;
        sumSaldo += d.saldo_actual;
      }
    }
    const dso = sumSaldo > 0 ? Math.round(sumDays / sumSaldo) : null;

    return {
      resumen: {
        cliente, anio: year, semana, fecha_corte,
        saldo_actual, saldo_vencido, notas_credito, saldo_a_vencer,
        razon_social,
        aging_d0_30, aging_d31_60, aging_d61_90, aging_mas90,
        venc_mes_1, venc_mes_2, venc_mes_3,
        dso,
        // NO tocamos linea_credito_usd: se conserva el valor previo de la DB
      },
      detalle
    };
  },

  // Parser para el formato "Antigüedad de Saldos - Cuentas por Cobrar".
  // Reportes sin estructura de "Semana N" — se calcula la semana ISO desde
  // la fecha del footer ("martes, 28 de abril de 2026 (HH:MM)").
  // Headers en row 1: Cliente, Movimiento, Referencia, Emisión, Vencimiento,
  // Días, Al Corriente, de 1 a 30, de 31 a 60, de 61 a 90, de 91 a 180,
  // de 181 a 360, de 361 a 999, más de 999 días.
  estadoCuentaAntiguedad(wb, cliente, filename){
    const sh = wb.Sheets[wb.SheetNames[0]];
    const arr = XLSX.utils.sheet_to_json(sh, {defval:null, header:1});

    // Mapeo de meses en español (con/sin punto)
    const MESES_ES = {
      'ene':1,'enero':1,'feb':2,'febrero':2,'mar':3,'marzo':3,'abr':4,'abril':4,
      'may':5,'mayo':5,'jun':6,'junio':6,'jul':7,'julio':7,'ago':8,'agosto':8,
      'sep':9,'sept':9,'septiembre':9,'oct':10,'octubre':10,'nov':11,'noviembre':11,
      'dic':12,'diciembre':12,
    };
    const parseFechaES = (raw) => {
      if (raw == null || raw === '') return null;
      // Si Excel ya lo dio como número serial
      if (typeof raw === 'number') {
        const d = new Date((raw - 25569) * 86400 * 1000);
        return isNaN(d) ? null : d.toISOString().slice(0, 10);
      }
      const s = String(raw).trim().replace(/\./g, '');
      // Formato "14/ene/2026" o "14/ene./2026"
      const m = s.match(/^(\d{1,2})\/([a-záéíóú]+)\/(\d{4})/i);
      if (m) {
        const mes = MESES_ES[m[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')];
        if (!mes) return null;
        return `${m[3]}-${String(mes).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
      }
      // Fallback ISO o DD/MM/YYYY
      return toISODate(raw);
    };

    // Detecta fila header (busca "Cliente" + "Movimiento" en la misma fila)
    let headerRow = -1;
    for (let i = 0; i < Math.min(arr.length, 10); i++) {
      const r = arr[i] || [];
      const txt = r.map(x => String(x||'').toLowerCase()).join('|');
      if (txt.includes('movimiento') && (txt.includes('al corriente') || txt.includes('vencimiento'))) {
        headerRow = i; break;
      }
    }
    if (headerRow < 0) headerRow = 1;
    const headers = (arr[headerRow] || []).map(h => String(h||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim());
    const colIdx = (substr) => headers.findIndex(h => h.includes(substr));
    const idx = {
      cliente:    colIdx('cliente'),
      movimiento: colIdx('movimiento'),
      referencia: colIdx('referencia'),
      emision:    colIdx('emision'),
      vencimiento:colIdx('vencimiento'),
      dias:       colIdx('dias'),
      corriente:  colIdx('al corriente'),
      d1_30:      headers.findIndex(h => /^de 1 a 30/.test(h) || /1 a 30/.test(h)),
      d31_60:     headers.findIndex(h => /31 a 60/.test(h)),
      d61_90:     headers.findIndex(h => /61 a 90/.test(h)),
      d91_180:    headers.findIndex(h => /91 a 180/.test(h)),
      d181_360:   headers.findIndex(h => /181 a 360/.test(h)),
      d361_999:   headers.findIndex(h => /361 a 999/.test(h)),
      d999plus:   headers.findIndex(h => /mas de 999/.test(h) || /999 dias/.test(h)),
    };

    // Razón social: a veces aparece en el row 0 col C (REVKO TECHNOLOGY)
    // Para Acteck/Balam Rush nuestro cliente PCEL = "PC ONLINE", Digitalife = "API GLOBAL"
    const razon_social = cliente === 'pcel' ? 'PC ONLINE' : 'API GLOBAL';

    // Detalle: filas después del header, con movimiento no nulo y que no sean totales/footers
    const detalle = [];
    let total_corriente = 0, total_1_30 = 0, total_31_60 = 0, total_61_90 = 0;
    let total_91_180 = 0, total_181_360 = 0, total_361_999 = 0, total_999plus = 0;
    let notas_credito = 0;

    for (let i = headerRow + 1; i < arr.length; i++) {
      const r = arr[i] || [];
      const movimiento = r[idx.movimiento];
      // Skip filas vacías, totales, subtotales, footer con fecha
      if (!movimiento) continue;
      const movStr = String(movimiento).trim().toLowerCase();
      if (movStr === '' || /^total/i.test(movStr) || /^subtotal/i.test(movStr)) continue;
      // Skip footer que tiene fecha como movimiento (ej: "martes, 28 de abril...")
      if (/^(lunes|martes|miercoles|miércoles|jueves|viernes|sabado|sábado|domingo)/i.test(movStr)) continue;
      // Skip filas de cliente identificador (00473 PC ONLINE)
      if (r[idx.cliente] && /^\d{5,}$/.test(String(r[idx.cliente]).trim())) continue;

      const ag_corr   = toNum(r[idx.corriente])  || 0;
      const ag_1_30   = toNum(r[idx.d1_30])      || 0;
      const ag_31_60  = toNum(r[idx.d31_60])     || 0;
      const ag_61_90  = toNum(r[idx.d61_90])     || 0;
      const ag_91_180 = toNum(r[idx.d91_180])    || 0;
      const ag_181_360= toNum(r[idx.d181_360])   || 0;
      const ag_361_999= toNum(r[idx.d361_999])   || 0;
      const ag_999    = toNum(r[idx.d999plus])   || 0;
      const importe   = ag_corr + ag_1_30 + ag_31_60 + ag_61_90 + ag_91_180 + ag_181_360 + ag_361_999 + ag_999;

      // Notas de crédito tienen importe negativo
      if (importe < 0) notas_credito += importe;

      total_corriente += ag_corr;
      total_1_30      += ag_1_30;
      total_31_60     += ag_31_60;
      total_61_90     += ag_61_90;
      total_91_180    += ag_91_180;
      total_181_360   += ag_181_360;
      total_361_999   += ag_361_999;
      total_999plus   += ag_999;

      detalle.push({
        movimiento: toStr(movimiento),
        condicion: null,
        referencia: toStr(r[idx.referencia]),
        fecha_emision: parseFechaES(r[idx.emision]),
        vencimiento: parseFechaES(r[idx.vencimiento]),
        importe_factura: importe,
        dias_moratorios: toInt(r[idx.dias]),
        saldo_actual: importe,
        aging_corriente: ag_corr,
        aging_01_30: ag_1_30,
        aging_31_60: ag_31_60,
        aging_61_90: ag_61_90,
        aging_91_180: ag_91_180,
        // En la DB sólo tenemos aging_181_mas — lo unificamos
        aging_181_mas: ag_181_360 + ag_361_999 + ag_999,
      });
    }

    // Fecha de corte: buscar en el footer (última fila con día de la semana)
    let fecha_corte = null;
    for (let i = arr.length - 1; i >= Math.max(0, arr.length - 5); i--) {
      const r = arr[i] || [];
      const txt = String(r[0] || '').trim();
      const m = txt.match(/(\d{1,2})\s+de\s+([a-záéíóú]+)\s+de\s+(\d{4})/i);
      if (m) {
        const mes = MESES_ES[m[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')];
        if (mes) { fecha_corte = `${m[3]}-${String(mes).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`; break; }
      }
    }
    // Fallback: fecha más reciente de las facturas, o hoy
    if (!fecha_corte) {
      const fechas = detalle.map(d => d.fecha_emision).filter(Boolean).sort();
      fecha_corte = fechas.length ? fechas[fechas.length - 1] : new Date().toISOString().slice(0, 10);
    }
    const cuteDate = new Date(fecha_corte + 'T00:00:00');

    // Semana ISO 8601 (lunes como inicio) desde fecha_corte.
    // Usa el algoritmo canónico: mover al jueves de la semana actual y
    // calcular semanas desde el 1 de enero del año del jueves.
    const isoWeek = (d) => {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      // Jueves de la semana actual (getUTCDay: 0=domingo, 1=lunes, ..., 4=jueves)
      date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
    };
    const semana = isoWeek(cuteDate);
    const year = cuteDate.getFullYear();

    // Resumen agregado
    const saldo_a_vencer = total_corriente;
    const saldo_vencido = total_1_30 + total_31_60 + total_61_90 + total_91_180 + total_181_360 + total_361_999 + total_999plus;
    const saldo_actual = saldo_a_vencer + saldo_vencido;
    const aging_d0_30  = total_1_30;
    const aging_d31_60 = total_31_60;
    const aging_d61_90 = total_61_90;
    const aging_mas90  = total_91_180 + total_181_360 + total_361_999 + total_999plus;

    // venc_mes_1/2/3 = mes 0/+1/+2 desde fecha_corte
    const offsetKey = (off) => {
      const d = new Date(cuteDate.getFullYear(), cuteDate.getMonth() + off, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    };
    const vencMap = {};
    for (const d of detalle) {
      if (d.vencimiento && d.saldo_actual > 0) {
        const k = d.vencimiento.slice(0, 7);
        vencMap[k] = (vencMap[k] || 0) + d.saldo_actual;
      }
    }
    const venc_mes_1 = vencMap[offsetKey(0)] || 0;
    const venc_mes_2 = vencMap[offsetKey(1)] || 0;
    const venc_mes_3 = vencMap[offsetKey(2)] || 0;

    // DSO ponderado
    let sumDays = 0, sumSaldo = 0;
    for (const d of detalle) {
      if (d.saldo_actual > 0 && d.fecha_emision) {
        const fe = new Date(d.fecha_emision + 'T00:00:00');
        const days = Math.max(0, Math.floor((cuteDate - fe) / 86400000));
        sumDays += days * d.saldo_actual;
        sumSaldo += d.saldo_actual;
      }
    }
    const dso = sumSaldo > 0 ? Math.round(sumDays / sumSaldo) : null;

    return {
      resumen: {
        cliente, anio: year, semana, fecha_corte,
        saldo_actual, saldo_vencido, notas_credito, saldo_a_vencer,
        razon_social,
        aging_d0_30, aging_d31_60, aging_d61_90, aging_mas90,
        venc_mes_1, venc_mes_2, venc_mes_3,
        dso,
      },
      detalle,
    };
  },

  masterEmbarques(wb){
    // Lee TODAS las hojas históricas: 2026, 2025, 2024, "2022 - 2023".
    // Si una hoja no existe, se omite. La unique key es (po, codigo) así que
    // posibles duplicados entre hojas son resueltos por el upsert.
    // Soporta nombres alternos del histórico (con/sin espacios alrededor del guión).
    const HOJAS_HISTORICAS = [
      '2026', '2025', '2024',
      '2022 - 2023', '2022-2023', '2023', '2022',
    ];
    const sheetsLeer = HOJAS_HISTORICAS.filter(name => wb.Sheets[name]);
    if (sheetsLeer.length === 0) {
      sheetsLeer.push(wb.SheetNames[0]);
    }

    const classifyCedis = (raw) => {
      const s = (raw == null ? '' : String(raw)).trim();
      if (!s) return { cedis: null, entrega_directa_cliente: null };
      if (/^\d/.test(s)) return { cedis: s, entrega_directa_cliente: null };
      return { cedis: s, entrega_directa_cliente: s };
    };

    // Detecta hoja "2024" corrupta por plugin de QR codes (headers basura
    // en cols A-F: Description, Your link, Tracked link, Number of click,
    // Created at, NEW! Get your QrCode). Si la primera columna se llama
    // así, leemos por posición.
    const isHoja2024Corrupta = (sh) => {
      const arr = XLSX.utils.sheet_to_json(sh, { defval:null, header:1 });
      if (!arr.length) return false;
      const h0 = String(arr[0][0] || '').toLowerCase();
      const h6 = String(arr[0][6] || '').toLowerCase();
      return h0.includes('description') && h6 === 'codigo';
    };

    // Lee la hoja 2024 corrupta usando posición fija. Los headers reales son:
    // [0] PO (header dice "Description") | [1-2] vacíos | [3] tipo_cont (header "Number of click")
    // [4] F.A. (header "Created at")     | [5] %  (header "NEW! QrCode")
    // [6] CODIGO  | [7] DESCRIPCIÓN | [8] PO QTY | [9] SHP QTY | [10] UNIT PRICE | [11] TOTAL
    // [12] SUPPLIER | [13] FECHA EMISIÓN | [14] FECHA INICIO PROD | [15] FIN PROD
    // [16] REF FF | [17] COSTO FLETE | [18] FORWARDER (~naviera) | [19] CONTENEDOR
    // [20] ETD | [21] ETA PUERTO | [22] ARRIBO A CEDIS | [23] CEDIS | [24] ESTATUS
    // [25] COMENTARIOS TRÁFICO | [26] COMENTARIOS DISEÑO
    const leerHoja2024Corrupta = (sh) => {
      const arr = XLSX.utils.sheet_to_json(sh, { defval:null, header:1 });
      const out = [];
      for (let i = 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || r.length === 0) continue;
        out.push({
          po:                         r[0],
          tipo_de_cont:               r[3],
          f_a:                        r[4],
          '%':                        r[5],
          codigo:                     r[6],
          descripcion:                r[7],
          po_qty:                     r[8],
          shp_qty:                    r[9],
          unit_price:                 r[10],
          total_amount:               r[11],
          supplier:                   r[12],
          fecha_emision:              r[13],
          fecha_inicio_de_produccion: r[14],
          fin_de_produccion:          r[15],
          ref_ff:                     r[16],
          costo_flete:                r[17],
          naviera:                    r[18],   // "FORWARDER" en el archivo
          contenedor:                 r[19],
          etd:                        r[20],
          eta_puerto:                 r[21],
          arribo_a_cedis:             r[22],
          cedis:                      r[23],
          estatus:                    r[24],
          comentarios_trafico:        r[25],
          comentarios_diseno:         r[26],
        });
      }
      return out;
    };

    // Procesa cada hoja y concatena
    const todasFilas = [];
    for (const sheetName of sheetsLeer) {
      const sh = wb.Sheets[sheetName];
      if (!sh) continue;
      let rows;
      if (sheetName === '2024' && isHoja2024Corrupta(sh)) {
        rows = leerHoja2024Corrupta(sh);
        console.log(`[masterEmbarques] Hoja "${sheetName}": ${rows.length} filas (modo corrupta-2024)`);
      } else {
        rows = XLSX.utils.sheet_to_json(sh, { defval:null });
        console.log(`[masterEmbarques] Hoja "${sheetName}": ${rows.length} filas`);
      }
      todasFilas.push(...rows);
    }

    return todasFilas.map(r => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const po = toStr(obj.po);
      const codigo = toStr(obj.codigo);
      // Filas basura: sin PO y sin código son separadores/totales
      if (!po || !codigo) return null;
      const { cedis, entrega_directa_cliente } = classifyCedis(obj.cedis);
      return {
        po,
        codigo,
        // Sinónimos para compatibilidad con hojas históricas:
        // - "FECHA EMISIÓN" (2025/2026) vs "FECHA DE EMISIÓN" (2022-2023, 2024)
        // - "ARRIBO A CEDIS" (2025/2026) vs "ETA ALMACEN" (2022-2023, 2024)
        // - "Grupo" (2025/2026) vs "RMDP" (2022-2023)
        // - "REF FF" (2025/2026) vs "REF FFW" / "FF" (históricos)
        fecha_emision: toISODate(obj.fecha_emision ?? obj.fecha_de_emision),
        grupo: toStr(obj.grupo ?? obj.rmdp ?? obj.tipo),
        cbm: toNum(obj.cbm),
        fraccion_arancelaria: toStr(obj.f_a ?? obj.fa),
        porcentaje: toNum(obj['%'] ?? obj.porcentaje),
        familia: toStr(obj.familia),
        descripcion: toStr(obj.descripcion),
        po_qty: toInt(obj.po_qty),
        shp_qty: toInt(obj.shp_qty),
        unit_price: toNum(obj.unit_price),
        total_amount: toNum(obj.total_amount),
        metodo_pago: toStr(obj.metodo_de_pago),
        supplier: toStr(obj.supplier),
        fecha_inicio_produccion: toISODate(obj.fecha_inicio_de_produccion),
        fin_produccion: toISODate(obj.fin_de_produccion),
        ref_ff: toStr(obj.ref_ff ?? obj.ref_ffw ?? obj.ff),
        naviera: toStr(obj.naviera),
        tipo_carga: toStr(obj.tipo_de_carga),
        tipo_contenedor: toStr(obj.tipo_de_cont),
        costo_flete: toNum(obj.costo_flete),
        fdw: toStr(obj.fdw),
        contenedor: toStr(obj.contenedor),
        etd: toISODate(obj.etd),
        eta_puerto: toISODate(obj.eta_puerto),
        agente_aduanal: toStr(obj.a_a ?? obj.aa),
        arribo_cedis: toISODate(obj.arribo_a_cedis ?? obj.eta_almacen),
        lt: toStr(obj.lt),
        cedis,
        entrega_directa_cliente,

  // Roadmap (catálogo maestro) — Roadmap.xlsx / Hoja1

  // Lista de Precios · Promoción mensual — mismo archivo mensual pero solo se extrae
  // la columna "Sell Out" (col 9) como promoción del mes. Cada SKU con Sell Out > 0
  // se guarda en promos_temporada con campania = "Sell Out · <MES> <AÑO>".
  // Los precios (Mayoreo AAA) siguen saliendo del ERP, aquí NO se cargan.
  sellOutMensual(wb, filename){
    const MESES_ES = {
      enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6,
      julio:7, agosto:8, septiembre:9, setiembre:9, octubre:10, noviembre:11, diciembre:12,
    };
    const MESES_LBL_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const detectarPeriodo = (name) => {
      const s = String(name || '').toLowerCase();
      let mes = null, anio = null;
      const mm = s.match(/\b(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)\b/);
      if (mm) mes = MESES_ES[mm[1]];

    const { anio, mes } = detectarPeriodo(filename);

    const sh = wb.Sheets['Lista'] || wb.Sheets[wb.SheetNames[0]];

      const sku = toStr(obj.articulo ?? obj.sku);
      const promo = toNum(obj.sell_out ?? obj.promo_sell_in);
      if (!sku || promo == null || promo <= 0) return null;
      return {
        sku, anio, mes,

  // Lista de Precios — archivo mensual (ej. "Lista de Precios Mayoreo AAA 2026 Julio.xlsx")
  // Hoja 'Lista', headers en fila 5 (range: 4), datos desde fila 6.
  // Columnas usadas:
  //   Marca | Nivel-1 | Familia | Artículo | Columna1 | Descripción
  //   PRECIOS: Mayoreo AAA | MSRP Distribuidor (ignora) | MSRP Usuario Final (ignora)
  //   PROMOCIONES: Sell Out  ← es realmente Promo Sell In (%, ej. 0.05 = 5%)
  //   UNIDADES: Piezas por Inner | Piezas por Pallet
  //   CÓDIGOS: EAN 13 | Código SAT
  // Precio neto = Mayoreo AAA × (1 − Promo Sell In)
  // Se guarda histórico por (sku, anio, mes) — año y mes se extraen del nombre del archivo.
  precios(wb, filename){
    const MESES_ES = {
      enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6,
      julio:7, agosto:8, septiembre:9, setiembre:9, octubre:10, noviembre:11, diciembre:12,
    };
    const detectarPeriodo = (name) => {
      const s = String(name || '').toLowerCase();
      let mes = null, anio = null;
      const mm = s.match(/\b(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)\b/);
      if (mm) mes = MESES_ES[mm[1]];
      const my = s.match(/\b(20\d{2})\b/);
      if (my) anio = parseInt(my[1], 10);
      if (!mes || !anio) {
        const now = new Date();
        if (!mes)  mes  = now.getMonth() + 1;
        if (!anio) anio = now.getFullYear();
      }
      return { anio, mes };
    };
    const { anio, mes } = detectarPeriodo(filename);
    const sh = wb.Sheets['Lista'] || wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(sh, {defval:null, range:4}).map((r,i) => {
      const obj={}; for(const k of Object.keys(r)) obj[snake(k)]=r[k];
      const sku = toStr(obj.articulo ?? obj.sku);
      if (!sku) return null;
      const precioAAA = toNum(obj.mayoreo_aaa ?? obj.aaa ?? obj.precio_aaa);
      const promo = toNum(obj.sell_out ?? obj.promo_sell_in);
      const precioNeto = precioAAA != null && promo != null
        ? Number((precioAAA * (1 - promo)).toFixed(4))
        : precioAAA;
      return {
        sku,
        anio, mes,
        precio_aaa: precioAAA,
        promo_sell_in: promo,
        precio_neto: precioNeto,
        piezas_inner: toInt(obj.piezas_por_inner),
        piezas_pallet: toInt(obj.piezas_por_pallet),
        ean13: toStr(obj.ean_13 ?? obj.ean13),
        codigo_sat: toStr(obj.codigo_sat),
        sort_order: i,
      };
    }).filter(Boolean);
  },

  // Sellout General — reporte semanal con detalle de ventas de mayoristas

  // Revko Sellout — reporte del ERP Revko de Acteck con la venta a clientes
  // finales por sucursal Dicotech/Acteck. Puede ser SEMANAL (solo última semana)
  // o MENSUAL (corte completo del mes).
  //
  // Columnas CSV: Fecha, Venta, Clave, Cantidad, Descripcion, Familia,
  // "Sucursal que genera venta", Cliente, "Sucursal que despacha el inventario",
  // Vendedor, Marca, costo_compra_antes_IVA, Distribuidor, costo_total_venta,
  // Moneda, precio_venta, precio_venta_antes_IVA, total_venta,
  // total_venta_antes_IVA, tipo_cliente, "Numero de parte", Tabulador.
  //
  // Todas las filas se mapean a mayorista='DICOTECH', idcliente=708.
  // IDs son HASH DETERMINISTA de (Venta+SKU+Fecha+Cantidad) → mismo archivo
  // reprocesado no duplica, cargar la semana 27 no borra la semana 26.
  // Upsert puro por id, sin deletePeriodos.
  revkoSellout(wb){
    const sh = wb.Sheets[wb.SheetNames[0]];
    if (typeof window !== 'undefined') {
      window.__revkoSelloutDiag = { rowsCrudas: 0, generados: 0, colisiones: 0, mesesDetectados: [], primerRowKeys: [], primerRowSample: null };
    }
    if (!sh) { console.warn('[revkoSellout] Sin hoja'); return []; }
    const rows = XLSX.utils.sheet_to_json(sh, { defval: null, raw: false });
    if (typeof window !== 'undefined') window.__revkoSelloutDiag.rowsCrudas = rows.length;
    if (rows.length > 0 && typeof window !== 'undefined') {
      window.__revkoSelloutDiag.primerRowKeys = Object.keys(rows[0]);
      window.__revkoSelloutDiag.primerRowSample = rows[0];
    }
    // Hash estable a bigint negativo (2 pasadas × 32 bit ≈ 53 bit → cabe en
    // Number.MAX_SAFE_INTEGER). Negativo para no chocar con IDs positivos del
    // selloutGeneral estándar.
    const hashRevko = (s) => {
      let h1 = 5381, h2 = 52711;
      for (let i = 0; i < s.length; i++) {
        const c = s.charCodeAt(i);
        h1 = ((h1 * 31) ^ c) | 0;
        h2 = ((h2 * 37) ^ c) | 0;
      }
      // Combina en un entero de ~52 bit (positivo primero, luego negamos)
      const combined = (Math.abs(h1) * 4194304) + (Math.abs(h2) & 0x3FFFFF);
      return -combined - 1; // -1..-2^53, siempre negativo
    };
    const out = [];
    const idsVistos = new Set();
    const mesesSet = new Set();
    let colisiones = 0;
    rows.forEach((r) => {
      const fecha = toISODate(r['Fecha']);
      if (!fecha) return;
      const [y, m] = fecha.split('-');
      const anio = parseInt(y, 10);
      const mes  = parseInt(m, 10);
      if (!anio || !mes) return;
      mesesSet.add(`${anio}-${mes}`);
      const venta = toStr(r['Venta']) || '';
      const clave = toStr(r['Clave']) || '';
      const cantidad = toNum(r['Cantidad']);
      // Hash content: venta|sku|fecha|cantidad — estable entre re-uploads
      let id = hashRevko(`REVKO|${venta}|${clave}|${fecha}|${cantidad ?? ''}`);
      // Colisión intra-archivo (raro): perturba con contador
      let bump = 0;
      while (idsVistos.has(id)) {
        bump++;
        id = hashRevko(`REVKO|${venta}|${clave}|${fecha}|${cantidad ?? ''}|${bump}`);
        colisiones++;
      }
      idsVistos.add(id);
      const sucursal = toStr(r['Sucursal que genera venta']);
      const almacen  = toStr(r['Sucursal que despacha el inventario']);
      const precioUnit = toNum(r['precio_venta_antes_IVA']) || toNum(r['precio_venta']);
      const importe    = toNum(r['total_venta_antes_IVA']) || toNum(r['total_venta']);
      out.push({
        id,
        idcliente: 708, // DICOTECH
        mayorista: 'DICOTECH',
        fecha, anio, mes,
        sku: clave,
        sku_cliente: toStr(r['Numero de parte']),
        descripcion: toStr(r['Descripcion']),
        cliente_codigo: null,
        cliente_nombre: toStr(r['Cliente']),
        cliente_rfc: null,
        vendedor: null,
        vendedor_nombre: toStr(r['Vendedor']),
        almacen,
        sucursal,
        cantidad,
        precio_unitario: precioUnit,
        importe,
        factura: venta,
        marca: toStr(r['Marca']),
        estado: null,
        linea: toStr(r['Familia']),
        moneda: toStr(r['Moneda']),
        importe_usd: null,
        tipocambio: null,
      });
    });
    if (typeof window !== 'undefined') {
      window.__revkoSelloutDiag.generados = out.length;
      window.__revkoSelloutDiag.colisiones = colisiones;
      window.__revkoSelloutDiag.mesesDetectados = Array.from(mesesSet);
    }
    return out;
  },

  // Promociones por temporada — archivo "Promociones Exclusivas <CAMPAÑA> <MES><AÑO>.xlsx"
  // Hoja 'Hoja1', headers en fila 2 (col 1=Articulo, col 2=Descripcion 2, col 3=Desc extra).
  // Cada archivo trae 1 sola campaña vigente en 1 mes. Al reprocesar el mismo mes se
  // reemplazan todas las filas de ese periodo (deletePeriodos).
  // Precio final = Mayoreo AAA × (1 − promo_sell_in) × (1 − promo_temporada).
  promosTemporada(wb, filename){
    const MESES_ES = {
      enero:1, ene:1, febrero:2, feb:2, marzo:3, mar:3, abril:4, abr:4, mayo:5, may:5, junio:6, jun:6,
      julio:7, jul:7, agosto:8, ago:8, septiembre:9, setiembre:9, sep:9, sept:9,
      octubre:10, oct:10, noviembre:11, nov:11, diciembre:12, dic:12,
    };
    const detectarPeriodo = (name) => {
      const s = String(name || '').toLowerCase();
      let mes = null, anio = null;
      for (const [nm, n] of Object.entries(MESES_ES)) {
        const re = new RegExp('\\b' + nm + '\\b|' + nm + '(?=\\d)', 'i');
        if (re.test(s)) { mes = n; break; }
      }
      const my = s.match(/\b(20\d{2})\b/) || s.match(/(20\d{2})/);
      if (my) anio = parseInt(my[1], 10);
      if (!mes || !anio) {
        const now = new Date();
        if (!mes)  mes  = now.getMonth() + 1;
        if (!anio) anio = now.getFullYear();
      }
      return { anio, mes };
    };
    const detectarCampania = (name) => {
      const raw = String(name || '').replace(/\.xlsx?$/i, '');
      const s = raw.replace(/^Promociones\s+Exclusivas\s+/i, '');
      const limpio = s.replace(/\s*(20\d{2}|Ene|Feb|Mar|Abr|May|Jun|Jul|Ago|Sep|Sept|Oct|Nov|Dic|Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre)[\s\d]*$/i, '').trim();
      return limpio || 'Sin nombre';
    };
    const { anio, mes } = detectarPeriodo(filename);
    const campania = detectarCampania(filename);
    const sh = wb.Sheets['Hoja1'] || wb.Sheets[wb.SheetNames[0]];
    // Header dinámico: detecta la fila que contiene "articulo" o "sku" y usa
    // esa como header. Permite columnas en cualquier orden y sin filas de
    // padding arriba (típico en "Promociones Exclusivas Back to School …").
    const arr = XLSX.utils.sheet_to_json(sh, {header:1, defval:null});
    let headerRow = -1;
    for (let i = 0; i < Math.min(10, arr.length); i++) {
      const row = arr[i] || [];
      const norm = row.map((c) => snake(String(c || '')));
      if (norm.some((c) => c === 'articulo' || c === 'sku' || c === 'no_parte')) {
        headerRow = i; break;
      }
    }
    if (headerRow < 0) return [];
    const headers = (arr[headerRow] || []).map((c) => snake(String(c || '')));
    const idx = (names) => headers.findIndex((h) => names.includes(h));
    const iSku   = idx(['articulo','sku','no_parte']);
    const iDesc  = idx(['descripcion','descripcion_2','desc','descripcion_1']);
    const iPromo = headers.findIndex((h) => h && (h.includes('promo') || h.includes('desc_extra') || h.includes('descuento') || h.includes('sell_out')));
    const out = [];
    for (let i = headerRow + 1; i < arr.length; i++) {
      const row = arr[i]; if (!row) continue;
      const sku = toStr(row[iSku]);
      if (!sku) continue;
      const desc = iDesc >= 0 ? toStr(row[iDesc]) : null;
      const promo = iPromo >= 0 ? toNum(row[iPromo]) : null;
      if (promo == null || promo <= 0) continue;
      out.push({
        sku, anio, mes,
        campania,
        promo_pct: promo,
        descripcion: desc,
        sort_order: i,
      });
    }
    return out;
  },

  // Hojas "Venta Facturación" (monto) + "Venta Piezas" (piezas) — dos pivots
  // separados del nuevo Excel ERP. Cada pivot tiene cliente padre + SKUs hijos
  // en filas y años/meses en columnas (un valor por celda, no pares). Las
  // devoluciones ya vienen aplicadas en el archivo.
  // Despivota ambos y los combina por (cliente_nombre, sku, anio, mes).
  facturacionClientes(wb){
    const shMonto = wb.Sheets['Venta Facturación'] || wb.Sheets['Venta Facturacion'] || wb.Sheets['Facturación'] || wb.Sheets['Facturacion'];
    const shPzs   = wb.Sheets['Venta Piezas'] || wb.Sheets['Venta piezas'];
    if (!shMonto && !shPzs) {
      throw new Error('No se encontraron las hojas "Venta Facturación" / "Venta Piezas" en el Excel');
    }

    const SKU_RE = /^[A-Z]{2,8}-[A-Z0-9_]+/;

    // Mapeo a cliente_key del dashboard (para los 3 distribuidores principales).
    // Los demás clientes quedan con cliente_key = slug(canal) para no romper
    // consultas que filtran por canal vía cliente_key.
    const mapearCliente = (nombre) => {
      const n = String(nombre || '').toUpperCase();
      if (n.includes('CAJADL01') || n.includes('API GLOBAL')) return 'digitalife';
      if (n.includes('PC ONLINE')) return 'pcel';
      if (n.includes('DICOTECH')) return 'dicotech';
      return null;
    };

    // Canales del nivel padre del pivot (jerarquía exacta del Excel).
    const CANALES_PADRE = new Set([
      'DISTRIBUIDOR', 'MAYOREO', 'E-COMMERCE', 'MOSTRADOR',
      'RETAIL REPRESENTADOS', 'RETAIL PROPIOS',
    ]);
    const esCanalPadre = (s) => CANALES_PADRE.has(String(s || '').toUpperCase().trim());
    const slugCanal = (s) => String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');

    // Despivota un pivot individual (cualquiera de los dos) y devuelve
    // un Map "cliente|sku|anio|mes" → valor numérico.
    const parsePivot = (sh) => {
      if (!sh) return new Map();
      const arr = XLSX.utils.sheet_to_json(sh, { defval: null, header: 1 });

      // Detectar la fila de meses: es la primera fila (en las primeras 20)
      // que contiene varios números 1..12 en columnas consecutivas.
      let mesesRowIdx = -1;
      for (let r = 0; r < Math.min(20, arr.length); r++) {
        const row = arr[r] || [];
        let count = 0;
        for (const v of row) {
          if (typeof v === 'number' && v >= 1 && v <= 12) count++;
          else if (v != null && /^([1-9]|1[0-2])$/.test(String(v).trim())) count++;
        }
        if (count >= 6) { mesesRowIdx = r; break; }
      }
      if (mesesRowIdx < 1) return new Map();

      const mesesRow = arr[mesesRowIdx] || [];
      const aniosRow = arr[mesesRowIdx - 1] || [];
      const dataStart = mesesRowIdx + 1;

      // Mapa col → (anio, mes). El año "actual" lo lleva la última celda
      // de aniosRow con un número 2020..2050; "(en blanco)" o "Total..." lo limpia.
      const colMap = [];
      let anioActual = null;
      const maxC = Math.max(aniosRow.length, mesesRow.length);
      for (let c = 0; c < maxC; c++) {
        const av = aniosRow[c];
        if (av != null) {
          if (typeof av === 'number' && av >= 2020 && av <= 2050) anioActual = av;
          else {
            const s = String(av).trim();
            if (/^\d{4}$/.test(s)) {
              const y = parseInt(s, 10);
              if (y >= 2020 && y <= 2050) anioActual = y;
            } else if (/blanco|total/i.test(s)) {
              anioActual = null;
            }
          }
        }
        const mv = mesesRow[c];
        let m = null;
        if (typeof mv === 'number' && mv >= 1 && mv <= 12) m = mv;
        else if (mv != null && /^([1-9]|1[0-2])$/.test(String(mv).trim())) m = parseInt(mv, 10);
        if (m && anioActual) colMap.push({ col: c, anio: anioActual, mes: m });
      }

      // Iterar filas de datos. Jerarquía Excel: CANAL (padre) → CLIENTE →
      // SKU (con valores por mes). Trackeamos canal+cliente y capturamos
      // TODOS los clientes (sin filtro). Cada entrada incluye canal.
      let canalActual = null;
      let clienteActual = null;
      const out = new Map();
      for (let r = dataStart; r < arr.length; r++) {
        const row = arr[r];
        if (!row) continue;
        const v = row[0];
        if (v == null) continue;
        const s = String(v).trim();
        if (!s) continue;
        if (/^\(en blanco\)$/i.test(s) || /total general/i.test(s) || /^total /i.test(s)) continue;

        if (SKU_RE.test(s)) {
          if (!clienteActual || !canalActual) continue;
          for (const cm of colMap) {
            const val = toNum(row[cm.col]);
            if (val == null || val === 0) continue;
            // Clave: canal|cliente|sku|anio|mes
            out.set(`${canalActual}|${clienteActual}|${s}|${cm.anio}|${cm.mes}`, val);
          }
        } else if (esCanalPadre(s)) {
          // Nueva sección de canal. Reset cliente.
          canalActual = s.toUpperCase().trim();
          clienteActual = null;
        } else {
          // Es un nombre de cliente dentro del canal actual.
          clienteActual = s;
        }
      }
      return out;
    };

    const piezasMap = parsePivot(shPzs);
    const montoMap  = parsePivot(shMonto);

    // Unir ambos por la misma clave (canal|cliente|sku|anio|mes). Si una
    // hoja tiene una celda y la otra no, la otra queda en 0.
    const keys = new Set([...piezasMap.keys(), ...montoMap.keys()]);
    const out = [];
    for (const k of keys) {
      const [canal, clienteNombre, sku, anioStr, mesStr] = k.split('|');
      // cliente_key: para los 3 distribuidores principales mantiene su key
      // canónica; para todos los demás usa el slug del canal.
      const cKey = mapearCliente(clienteNombre) || slugCanal(canal) || 'otros';
      out.push({
        cliente_nombre: clienteNombre,
        cliente_key: cKey,
        canal,
        sku,
        anio: parseInt(anioStr, 10),
        mes:  parseInt(mesStr, 10),
        piezas: piezasMap.get(k) || 0,
        monto:  montoMap.get(k)  || 0,
      });
    }
    return out;
  },

  // Estado de Resultados (P&L) — hoja "Estado de Resultados".
  // Layout:
  //   Row 2: razón social
  //   Row 4: "EJERCICIO YYYY" → de aquí sacamos el año
  //   Row 6: headers de mes (Enero..Diciembre en cols C..N)
  //   Row 7+: cuenta en col B, valores numéricos por mes en cols C..N
  // Solo se cargan celdas con valor numérico (las vacías quedan sin tocar).
  estadosResultados(wb){
    const sh = wb.Sheets['Estado de Resultados'] || wb.Sheets['ESTADO DE RESULTADOS'] || wb.Sheets['Estado de resultados'];
    if (!sh) throw new Error('No se encontró la hoja "Estado de Resultados"');
    const arr = XLSX.utils.sheet_to_json(sh, { defval: null, header: 1 });

    // Razón social (row 2 col B). Default REVKO si no aparece.
    let razonSocial = 'REVKO TECHNOLOGY SA DE CV';
    for (let r = 0; r < Math.min(6, arr.length); r++) {
      const row = arr[r] || [];
      for (const v of row) {
        if (typeof v === 'string' && /S\.?A\.?\s*DE\s*C\.?V\.?/i.test(v)) {
          razonSocial = v.trim();
          break;
        }
      }
    }

    // Año desde "EJERCICIO YYYY" en las primeras filas.
    let anio = null;
    for (let r = 0; r < Math.min(8, arr.length); r++) {
      const row = arr[r] || [];
      for (const v of row) {
        if (typeof v === 'string') {
          const m = v.match(/EJERCICIO\s+(\d{4})/i);
          if (m) { anio = parseInt(m[1], 10); break; }
        }
      }
      if (anio) break;
    }
    if (!anio) throw new Error('No se detectó el año del P&L (busca "EJERCICIO YYYY" en las primeras filas).');

    // Header row de meses — primera fila con varios meses en español.
    const NOMBRES_MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const norm = (s) => String(s || '').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    let headerRowIdx = -1;
    for (let r = 0; r < Math.min(20, arr.length); r++) {
      const row = arr[r] || [];
      let count = 0;
      for (const v of row) if (NOMBRES_MES.includes(norm(v))) count++;
      if (count >= 6) { headerRowIdx = r; break; }
    }
    if (headerRowIdx < 0) throw new Error('No se encontró la fila de headers de meses en la hoja');

    // Mapa col → mes
    const colToMes = {};
    (arr[headerRowIdx] || []).forEach((v, c) => {
      const idx = NOMBRES_MES.indexOf(norm(v));
      if (idx >= 0) colToMes[c] = idx + 1;
    });

    // Subtotales conocidos (clave normalizada)
    const SUBTOTALES = new Set([
      'venta_neta', 'total_costo_de_venta', 'utilidad_bruta',
      'total_gastos', 'total_gastos_proyectos',
      'uafir_con_proyectos', 'uafir_sin_proyectos',
      'total_productos_financieros',
      'uaii_contable_con_proyecctos', 'uaii_contable_con_proyectos',
      'uaii_contable_sin_proyectos',
    ]);

    const cuentaSlug = (s) => norm(s)
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');

    // Pasada 1: detectar qué meses tienen actividad real.
    // Usamos VENTAS Y SERVICIOS A TASA GENERAL como indicador canónico — es la
    // línea de ingresos principal y solo se llena cuando el mes ya cerró.
    // Si no aparece esa fila, hacemos fallback al primer ingreso/gasto detalle
    // con valor distinto de cero.
    const mesesActivos = new Set();
    let ventasGeneralRow = null;
    for (let r = headerRowIdx + 1; r < arr.length; r++) {
      const row = arr[r]; if (!row) continue;
      let cuenta = null;
      for (let c = 0; c < 3; c++) {
        const v = row[c];
        if (typeof v === 'string' && v.trim() !== '') { cuenta = v.trim(); break; }
      }
      if (cuenta && cuentaSlug(cuenta) === 'ventas_y_servicios_a_tasa_general') {
        ventasGeneralRow = row;
        break;
      }
    }
    if (ventasGeneralRow) {
      for (const [colStr, mes] of Object.entries(colToMes)) {
        const v = ventasGeneralRow[Number(colStr)];
        if (typeof v === 'number' && v !== 0) mesesActivos.add(mes);
      }
    }
    if (mesesActivos.size === 0) {
      throw new Error('No se detectaron meses con valores reales (revisa que la hoja tenga la línea VENTAS Y SERVICIOS A TASA GENERAL).');
    }

    // Pasada 1.5: capturar comments (annotations amarillas) de las celdas y
    // mapearlos por (cuenta_norm, mes). Los comments en la col de nombres
    // (B normalmente) aplican a TODA la cuenta.
    const notasPorClave = {};
    const notasPorCuenta = {};
    const limpiarTexto = (t) => String(t || '').replace(/^[^:\n]+:\s*/, '').replace(/\s+/g, ' ').trim();
    Object.keys(sh).forEach((addr) => {
      if (addr[0] === '!') return;
      const cell = sh[addr];
      if (!cell || !cell.c) return;
      const ref = XLSX.utils.decode_cell(addr);
      const r = ref.r, c = ref.c;
      const texto = limpiarTexto(cell.c.map((p) => p.t || '').join(' '));
      if (!texto) return;
      // Cuenta de esta fila
      const row = arr[r];
      if (!row) return;
      let cuenta = null;
      for (let cc = 0; cc < 3; cc++) {
        const v = row[cc];
        if (typeof v === 'string' && v.trim() !== '') { cuenta = v.trim(); break; }
      }
      if (!cuenta) return;
      const slug = cuentaSlug(cuenta);
      if (!slug) return;
      if (colToMes[c] != null) {
        notasPorClave[`${slug}|${colToMes[c]}`] = texto;
      } else {
        notasPorCuenta[slug] = texto;
      }
    });

    // Pasada 2: extraer valores SÓLO de los meses activos (incluye subtotales y ceros legítimos).
    const out = [];
    let orden = 0;
    for (let r = headerRowIdx + 1; r < arr.length; r++) {
      const row = arr[r];
      if (!row) continue;
      let cuenta = null;
      for (let c = 0; c < 3; c++) {
        const v = row[c];
        if (typeof v === 'string' && v.trim() !== '') { cuenta = v.trim(); break; }
      }
      if (!cuenta) continue;
      if (/^informacion general$/i.test(cuenta)) continue;

      const slug = cuentaSlug(cuenta);
      if (!slug) continue;
      orden++;
      const esSubtotal = SUBTOTALES.has(slug);

      for (const [colStr, mes] of Object.entries(colToMes)) {
        if (!mesesActivos.has(mes)) continue;
        const c = Number(colStr);
        const v = row[c];
        if (v == null || v === '' || typeof v === 'string') continue;
        const valor = Number(v);
        if (isNaN(valor)) continue;
        out.push({
          razon_social: razonSocial,
          anio,
          mes,
          cuenta,
          cuenta_norm: slug,
          valor,
          orden,
          es_subtotal: esSubtotal,
          nota: notasPorClave[`${slug}|${mes}`] || notasPorCuenta[slug] || null,
        });
      }
    }
    if (out.length === 0) throw new Error('No se extrajo ninguna celda numérica del P&L.');
    return out;
  },
};

// ===== Last-updated helpers =====
function getLastUpdated(srcId){
  try { const d = JSON.parse(localStorage.getItem(LS_UPDATED_KEY)||'{}'); return d[srcId]||null; } catch{ return null; }
}
function saveLastUpdated(srcId){
  try { const d = JSON.parse(localStorage.getItem(LS_UPDATED_KEY)||'{}'); d[srcId]=new Date().toISOString(); localStorage.setItem(LS_UPDATED_KEY,JSON.stringify(d)); } catch{}
}
function fmtDate(iso){
  if(!iso) return null;
  const d=new Date(iso);
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ===== Historial de actualizaciones (últimas N por srcId) =====
const LS_HISTORIAL_KEY = 'uploads_history_v1';
const HISTORIAL_MAX = 30;
function getHistorial(srcId){
  try { const d = JSON.parse(localStorage.getItem(LS_HISTORIAL_KEY)||'{}'); return Array.isArray(d[srcId]) ? d[srcId] : []; } catch{ return []; }
}
function histBtnLabel(srcId, open){
  const n = getHistorial(srcId).length;
  const arrow = open ? '▲' : '▼';
  return n === 0 ? 'Ver historial ' + arrow : 'Historial (' + n + ') ' + arrow;
}
function pushHistorial(srcId, meta){
  try {
    const d = JSON.parse(localStorage.getItem(LS_HISTORIAL_KEY)||'{}');
    const arr = Array.isArray(d[srcId]) ? d[srcId] : [];
    arr.unshift(Object.assign({ fecha: new Date().toISOString() }, meta));
    d[srcId] = arr.slice(0, HISTORIAL_MAX);
    localStorage.setItem(LS_HISTORIAL_KEY, JSON.stringify(d));
    const panel = document.getElementById('hist-panel-' + srcId);
    if (panel && panel.classList.contains('open')) renderHistorialInto(panel, srcId);
    const btn = document.getElementById('hist-btn-' + srcId);
    if (btn) btn.textContent = histBtnLabel(srcId, panel && panel.classList.contains('open'));
    const wrap = document.getElementById('hist-wrap-' + srcId);
    if (wrap) wrap.style.display = '';
  } catch(e) { console.warn('pushHistorial error', e); }
}
function renderHistorialInto(cont, srcId){
  const arr = getHistorial(srcId);
  cont.innerHTML = '';
  if (arr.length === 0) {
    cont.appendChild(el('div', {style:'padding:12px; color:#94A3B8; font-size:11px; text-align:center;'}, 'Sin cargas registradas todavía'));
    return;
  }
  const ok = arr.filter(function(x){ return x.estado === 'ok'; }).length;
  const err = arr.filter(function(x){ return x.estado === 'error'; }).length;
  const TIPO_LBL = { upload:'Archivo', sync:'Sync manual', cron:'Auto-sync', extra:'Slot extra' };
  const header = el('div', {style:'background:#F8FAFC; padding:8px 12px; font-size:10px; color:#64748B; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid #E2E8F0; display:flex; justify-content:space-between;'},
    el('span', {}, 'Historial (últimas ' + arr.length + ')'),
    el('span', {style:'text-transform:none; letter-spacing:0;'}, ok + ' exitosas · ' + err + ' error' + (err !== 1 ? 'es' : ''))
  );
  cont.appendChild(header);
  for (const it of arr) {
    const colorEst = it.estado === 'error' ? '#DC2626' : '#059669';
    const iconoEst = it.estado === 'error' ? '✗' : '✓';
    const tipo = TIPO_LBL[it.tipo] || 'Carga';
    const detalle = it.filas
      ? (it.archivo ? it.archivo + ' · ' : '') + it.filas.toLocaleString() + ' filas'
      : (it.mensaje || '');
    const detalleColor = it.estado === 'error' ? '#DC2626' : '#64748B';
    const row = el('div', {style:'padding:10px 12px; border-bottom:1px solid #F1F5F9; display:grid; grid-template-columns:16px 1fr auto; gap:10px; align-items:baseline;'},
      el('span', {style:'color:' + colorEst + '; font-weight:500;'}, iconoEst),
      el('div', {},
        el('div', {style:'font-size:12px; color:#1E293B; font-weight:500;'}, fmtDate(it.fecha)),
        detalle ? el('div', {style:'font-size:11px; color:' + detalleColor + '; margin-top:1px;'}, detalle) : null,
      ),
      el('span', {style:'font-size:10px; color:#94A3B8; text-transform:uppercase; letter-spacing:0.5px;'}, tipo),
    );
    cont.appendChild(row);
  }
}

// ===== UI =====
function el(tag, attrs={}, ...kids){
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const k of kids.flat()) if (k != null) n.append(k.nodeType ? k : document.createTextNode(k));
  return n;
}

// ===== Estado de datos (última actualización por fuente) =====
let UPLOAD_STATUS = {};
const LS_COLAPSADOS_KEY = 'uploads_grupos_colapsados';

const MES_CORTO_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function fmtDiaMesAnio(iso){
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return `${d.getDate()} ${MES_CORTO_ES[d.getMonth()]} ${d.getFullYear()}`;
}

function diasDesde(iso){
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function freshnessClass(dias){
  if (dias == null) return '';
  if (dias <= 7) return 'fresh';
  if (dias <= 14) return 'stale';
  return 'old';
}

// Devuelve {label, dias} para una fuente según su `tipo` y la respuesta de
// /api/upload-status. dias se usa para colorear el semáforo.
function describirEstado(src){
  const info = UPLOAD_STATUS[src.statusKey];
  if (!info) return null;

  if (src.tipo === 'sellout') {
    const label = info.fecha ? `Última venta: ${fmtDiaMesAnio(info.fecha)}` : null;
    return label ? { label, dias: diasDesde(info.fecha) } : null;
  }

  if (src.tipo === 'semana') {
    if (info.anio && info.semana) {
      const corte = info.fecha_corte ? ` · corte ${fmtDiaMesAnio(info.fecha_corte)}` : '';
      const dias = diasDesde(info.fecha_corte || info.updated_at);
      return { label: `Semana ${info.semana}/${info.anio}${corte}`, dias };
    }
    return null;
  }

  if (src.tipo === 'mes') {
    if (info.anio && info.mes) {
      const mes = MES_CORTO_ES[info.mes - 1] || info.mes;
      return { label: `Hasta ${mes} ${info.anio}`, dias: null };
    }
    return null;
  }

  if (src.tipo === 'updated') {
    const f = fmtDiaMesAnio(info.updated_at);
    return f ? { label: `Actualizado ${f}`, dias: diasDesde(info.updated_at) } : null;
  }

  return null;
}

function pintarEstadoFuente(src){
  const node = document.getElementById(`fstatus-${src.id}`);
  if (!node) return;
  const est = describirEstado(src);
  node.className = 'fuente-status';
  if (!est) {
    node.classList.add('empty');
    node.innerHTML = '';
    node.append(el('span', {class:'dot'}), 'Sin datos en Supabase');
    return;
  }
  const cls = freshnessClass(est.dias);
  if (cls) node.classList.add(cls);
  node.innerHTML = '';
  node.append(el('span', {class:'dot'}), est.label);
}

async function cargarStatusFuentes(){
  try {
    const r = await fetch('/api/upload-status', { cache: 'no-store' });
    if (!r.ok) return;
    UPLOAD_STATUS = await r.json();
    for (const src of SOURCES) pintarEstadoFuente(src);
  } catch (e) {
    console.warn('No se pudo cargar /api/upload-status', e);
  }
}
