<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Actualizar datos — Acteck Dashboard</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#f8fafc;color:#0f172a}
header{padding:20px 32px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:20px}
header a{color:#1e40af;text-decoration:none;font-size:14px}
main{padding:24px 32px;max-width:1280px;margin:0 auto}
.intro{color:#475569;margin-bottom:20px;line-height:1.5;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card h3{margin:0;font-size:15px;font-weight:700}
.card .desc{color:#64748b;font-size:12px;line-height:1.4}
.card .meta{font-size:11px;color:#94a3b8;font-family:ui-monospace,monospace}
.drop{border:2px dashed #cbd5e1;border-radius:10px;padding:18px 12px;text-align:center;background:#f8fafc;cursor:pointer;transition:all .15s;position:relative;display:block}
.drop:hover{border-color:#1e40af;background:#eff6ff}
.drop.has-file{border-color:#059669;background:#f0fdf4;border-style:solid}
.drop .icon{font-size:28px;display:block;margin-bottom:4px}
.drop .label{font-size:13px;font-weight:600;color:#334155;display:block}
.drop .fname{font-size:12px;color:#059669;margin-top:4px;font-weight:600;word-break:break-all;display:block}
.drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.row{display:flex;gap:8px;align-items:center}
.btn{background:#1e40af;color:#fff;border:0;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;flex:1}
.btn:hover:not(:disabled){background:#1e3a8a}
.btn:disabled{opacity:.45;cursor:not-allowed}
.status{font-size:12px;min-height:16px;font-weight:500}
.s-ok{color:#059669}.s-err{color:#dc2626}.s-warn{color:#d97706}.s-info{color:#1e40af}
.log{max-height:120px;overflow:auto;font-family:ui-monospace,monospace;font-size:11px;background:#0f172a;color:#cbd5e1;border-radius:6px;padding:8px;white-space:pre-wrap;display:none}
.log.open{display:block}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;margin-left:6px}
</style>
</head>
<body>
<header>
<h1>⚙️ Actualizar datos (Excel → Supabase)</h1>
<a href="/">← Volver al dashboard</a>
</header>
<main>
<p class="intro">Selecciona cada archivo <strong>tal como te lo comparten</strong>. Cada tarjeta procesa un archivo y actualiza la tabla correspondiente en Supabase.</p>
<div class="grid" id="grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const SOURCES = [
  { id:'erp-ventas', title:'ERP Acteck — Ventas', desc:'Vw_TablaH_Ventas (upsert incremental).', file:'Actualizaciones ERP.xlsx', sheet:'Ventas', table:'ventas_erp', onConflict:'venta_id,venta_renglon', parser:'erpVentas' },
  { id:'erp-inv', title:'ERP Acteck — Inventario', desc:'Vw_TablaH_Inventario (reemplazo total).', file:'Actualizaciones ERP.xlsx', sheet:'Inventario', table:'inventario_acteck', onConflict:'articulo,no_almacen', parser:'erpInv', replace:true },
  { id:'dl-sellout', title:'Digitalife — Sellout semanal', desc:'Acteck_BalamRush_Ventas (Hoja40). Append con dedup.', file:'Acteck_BalamRush_Ventas.xlsx', sheet:'Hoja40', table:'sellout_detalle', onConflict:'cliente,fecha,no_parte,row_hash', parser:'dlSellout' },
  { id:'dl-inv', title:'Digitalife — Inventario actual', desc:'Inventario cliente (reemplazo total).', file:'Inventario_Digitalife.xlsx', sheet:'', table:'inventario_cliente', onConflict:'cliente,no_parte', parser:'dlInv', replace:true },
  { id:'pcel-vm', title:'PCEL — Venta Marca', desc:'Reporte_VM_PCEL con sell in/out semanal.', file:'Reporte_VM_PCEL.xlsx', sheet:'', table:'sellout_pcel', onConflict:'anio,semana,sku', parser:'pcelVM' },
  { id:'ec-pcel', title:'Estado de Cuenta — PCEL', desc:'Aging por semana (0-30/31-60/61-90/91-180).', file:'EC_PCEL.xlsx', sheet:'', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'ecPcel', cliente:'PCEL' },
  { id:'ec-dl', title:'Estado de Cuenta — Digitalife', desc:'Aging Digitalife por semana.', file:'EC_Digitalife.xlsx', sheet:'', table:'estados_cuenta', onConflict:'cliente,anio,semana', parser:'ecPcel', cliente:'DIGITALIFE' },
  { id:'rp', title:'Roadmap — Precios SKU', desc:'Catálogo SKU/EAN con precios lista.', file:'Roadmap_SKU.xlsx', sheet:'', table:'precios_sku', onConflict:'sku', parser:'roadmap' }
];

const toNum = v => { if(v==null||v==='')return 0; const n=+String(v).replace(/[,$\s]/g,''); return isFinite(n)?n:0; };
const toStr = v => v==null?'':String(v).trim();
const toISO = v => { if(!v)return null; if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);return d?d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0'):null;} const s=String(v); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); return m?m[0]:null; };
const hash = s => { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;} return String(h); };

const PARSERS = {
  erpVentas: rows => rows.map(r => ({
    venta_id: toStr(r.Venta||r.venta),
    venta_renglon: toNum(r.Renglon||r.renglon),
    fecha: toISO(r.Fecha||r.fecha),
    cliente: toStr(r.Cliente||r.cliente),
    articulo: toStr(r.Articulo||r.articulo),
    cantidad: toNum(r.Cantidad||r.cantidad),
    precio_unitario: toNum(r.PrecioUnitario||r.precio_unitario||r.Precio),
    descuento: toNum(r.Descuento||r.descuento),
    importe: toNum(r.Importe||r.importe),
    vendedor: toStr(r.Vendedor||r.vendedor),
    almacen: toStr(r.Almacen||r.almacen)
  })).filter(r => r.venta_id),
  erpInv: rows => rows.map(r => ({
    articulo: toStr(r.Articulo||r.articulo),
    no_almacen: toStr(r.Almacen||r.almacen||r.NoAlmacen),
    descripcion: toStr(r.Descripcion||r.descripcion),
    existencia: toNum(r.Existencia||r.existencia),
    disponible: toNum(r.Disponible||r.disponible)
  })).filter(r => r.articulo),
  dlSellout: rows => rows.map(r => {
    const base = {
      cliente: toStr(r.Cliente||r.cliente||'DIGITALIFE'),
      fecha: toISO(r.Fecha||r.fecha),
      no_parte: toStr(r.NoParte||r.no_parte||r.SKU||r.sku),
      descripcion: toStr(r.Descripcion||r.descripcion),
      cantidad: toNum(r.Cantidad||r.cantidad),
      precio: toNum(r.Precio||r.precio),
      importe: toNum(r.Importe||r.importe)
    };
    base.row_hash = hash([base.cliente,base.fecha,base.no_parte,base.cantidad,base.importe].join('|'));
    return base;
  }).filter(r => r.no_parte && r.fecha),
  dlInv: rows => rows.map(r => ({
    cliente: toStr(r.Cliente||r.cliente||'DIGITALIFE'),
    no_parte: toStr(r.NoParte||r.no_parte||r.SKU||r.sku),
    descripcion: toStr(r.Descripcion||r.descripcion),
    existencia: toNum(r.Existencia||r.existencia||r.Stock)
  })).filter(r => r.no_parte),
  pcelVM: rows => rows.map(r => ({
    anio: toNum(r.Anio||r.anio||r.Year),
    semana: toNum(r.Semana||r.semana||r.Week),
    sku: toStr(r.SKU||r.sku||r.NoParte),
    descripcion: toStr(r.Descripcion||r.descripcion),
    sell_in: toNum(r.SellIn||r.sell_in||r['Sell In']),
    sell_out: toNum(r.SellOut||r.sell_out||r['Sell Out']),
    inventario: toNum(r.Inventario||r.inventario||r.Stock)
  })).filter(r => r.sku && r.anio),
  ecPcel: (rows, cliente) => {
    const out = {};
    rows.forEach(r => {
      const anio = toNum(r.Anio||r.anio||new Date().getFullYear());
      const semana = toNum(r.Semana||r.semana);
      if(!semana) return;
      const k = anio+'|'+semana;
      if(!out[k]) out[k] = { cliente, anio, semana, d0_30:0, d31_60:0, d61_90:0, d91_180:0, d_vencido:0, saldo_total:0 };
      out[k].d0_30 += toNum(r['0-30']||r.d0_30);
      out[k].d31_60 += toNum(r['31-60']||r.d31_60);
      out[k].d61_90 += toNum(r['61-90']||r.d61_90);
      out[k].d91_180 += toNum(r['91-180']||r.d91_180);
      out[k].d_vencido += toNum(r.Vencido||r.d_vencido||r['>180']);
      out[k].saldo_total += toNum(r.Saldo||r.saldo_total||r.Total);
    });
    return Object.values(out);
  },
  roadmap: rows => rows.map(r => ({
    sku: toStr(r.SKU||r.sku||r.NoParte),
    ean: toStr(r.EAN||r.ean),
    descripcion: toStr(r.Descripcion||r.descripcion),
    precio_lista: toNum(r.PrecioLista||r.precio_lista||r.Precio),
    cliente: toStr(r.Cliente||r.cliente),
    categoria: toStr(r.Categoria||r.categoria),
    marca: toStr(r.Marca||r.marca)
  })).filter(r => r.sku)
};

async function postChunks(src, rows, logEl, statusEl) {
  const CHUNK = 500;
  let total = 0;
  for (let i=0;i<rows.length;i+=CHUNK) {
    const batch = rows.slice(i, i+CHUNK);
    const body = { table: src.table, rows: batch, onConflict: src.onConflict, replace: src.replace && i===0 };
    const r = await fetch('/api/import-central', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!r.ok) { const t = await r.text(); throw new Error('HTTP '+r.status+': '+t.slice(0,200)); }
    const j = await r.json();
    total += batch.length;
    logEl.textContent += 'Lote '+(i/CHUNK+1)+': '+batch.length+' filas OK ('+(j.inserted||batch.length)+' insertadas)\n';
    statusEl.textContent = 'Procesando... '+total+'/'+rows.length;
  }
  return total;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';
    const tag = src.replace ? '<span class="tag">REEMPLAZA</span>' : '';
    card.innerHTML =
      '<h3>'+src.title+tag+'</h3>'+
      '<div class="desc">'+src.desc+'</div>'+
      '<div class="meta">Archivo: '+src.file+' &rarr; tabla: '+src.table+'</div>'+
      '<label class="drop" data-drop>'+
        '<span class="icon">&#128193;</span>'+
        '<span class="label">Click aqui para seleccionar archivo</span>'+
        '<span class="fname" data-fname></span>'+
        '<input type="file" accept=".xlsx,.xls,.csv" data-input />'+
      '</label>'+
      '<div class="status" data-status></div>'+
      '<div class="row">'+
        '<button class="btn" data-btn disabled>Procesar y subir</button>'+
      '</div>'+
      '<div class="log" data-log></div>';
    grid.appendChild(card);

    const input = card.querySelector('[data-input]');
    const drop = card.querySelector('[data-drop]');
    const fname = card.querySelector('[data-fname]');
    const btn = card.querySelector('[data-btn]');
    const status = card.querySelector('[data-status]');
    const log = card.querySelector('[data-log]');
    let parsedRows = null;

    input.addEventListener('change', async () => {
      const f = input.files[0];
      if (!f) return;
      fname.textContent = '\u2713 ' + f.name;
      drop.classList.add('has-file');
      status.className = 'status s-info';
      status.textContent = 'Leyendo archivo...';
      btn.disabled = true;
      log.classList.remove('open');
      log.textContent = '';
      try {
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf, { type:'array', cellDates:false });
        const sheetName = src.sheet && wb.Sheets[src.sheet] ? src.sheet : wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval:null, raw:true });
        const parser = PARSERS[src.parser];
        const parsed = src.cliente ? parser(rows, src.cliente) : parser(rows);
        parsedRows = parsed;
        status.className = 'status s-ok';
        status.textContent = '\u2713 '+parsed.length+' filas listas (de '+rows.length+' leidas).';
        btn.disabled = parsed.length === 0;
      } catch(e) {
        status.className = 'status s-err';
        status.textContent = 'Error leyendo: ' + e.message;
      }
    });

    btn.addEventListener('click', async () => {
      if (!parsedRows || parsedRows.length === 0) return;
      btn.disabled = true;
      log.classList.add('open');
      log.textContent = '';
      status.className = 'status s-info';
      status.textContent = 'Subiendo a Supabase...';
      try {
        const total = await postChunks(src, parsedRows, log, status);
        status.className = 'status s-ok';
        status.textContent = '\u2713 '+total+' filas procesadas en '+src.table+'.';
      } catch(e) {
        status.className = 'status s-err';
        status.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    });
  });
}

render();
</script>
</body>
</html>
